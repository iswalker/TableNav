function renderInspTable() {
  const wrap = document.getElementById('ip-table-wrap');
  if (!wrap) return;
  const _hideToggles = function() {
    const dge = document.getElementById('ip-date-group'); if (dge) dge.style.display = 'none';
    const sge = document.getElementById('ip-sort-group'); if (sge) sge.style.display = 'none';
  };
  if (!Insp.sumby.length) {
    wrap.innerHTML = '<div class="ip-empty">Drag at least one field to "Pivot" to see a summary.</div>';
    _hideToggles(); return;
  }
  const rows = S.rows;
  if (!rows || rows.length < 2) {
    wrap.innerHTML = '<div class="ip-empty">No data.</div>';
    _hideToggles(); return;
  }

  const priCol = Insp.sumby[0];
  const secCol = Insp.sumby.length > 1 ? Insp.sumby[1] : null;

  // Build vis using current filter state (same logic as refreshRows)
  const dataRows = [];
  for (let r = 1; r < rows.length; r++) {
    if (passesFilters(r)) dataRows.push(rows[r]);
  }
  const total = dataRows.length;

  // ---- DATE COLUMN: YEAR / MONTH / DATE GROUPING ----
  const dgEl = document.getElementById('ip-date-group');
  if (colIsDateType(priCol)) {
    // Show segmented toggle and sync active button
    if (dgEl) {
      dgEl.style.display = 'flex';
      dgEl.querySelectorAll('button').forEach(function(b) {
        b.classList.toggle('idg-on', b.id === 'idg-' + Insp.dateGroup);
      });
    }
    const sgEl = document.getElementById('ip-sort-group');
    if (sgEl) {
      sgEl.style.display = 'flex';
      sgEl.querySelectorAll('button').forEach(function(b) {
        b.classList.toggle('idg-on', b.id === 'isg-' + Insp.sortBy);
      });
    }
    const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dg = Insp.dateGroup || 'year';
    const sb = Insp.sortBy || 'values';
    const priHeader = rows[0][priCol] || ('Col ' + priCol);
    const priColJ = ea(JSON.stringify(priCol));

    // Shared canvas for width measurement
    const cvs = document.createElement('canvas');
    const cctx = cvs.getContext('2d');
    cctx.font = '12px "Segoe UI", sans-serif';
    const PAD = 24; // 8px cell padding each side + 8px buffer for canvas vs browser rendering
    let valW = cctx.measureText(priHeader).width + PAD;
    let countW = cctx.measureText('Count').width + PAD;
    let pctW = cctx.measureText('Count (%)').width + PAD;

    // ---- Build year→month→day tree (shared by Year + Month modes) ----
    const tree = new Map(); // yr → Map<mo → Map<day → {count, rawVals:Set}>>
    let blankCount = 0;
    for (const row of dataRows) {
      const raw = row[priCol] || '';
      if (!raw) { blankCount++; continue; }
      const ms = parseDateToMs(raw);
      if (ms === null) { blankCount++; continue; }
      const d = new Date(ms);
      const yr = d.getUTCFullYear(), mo = d.getUTCMonth(), day = d.getUTCDate();
      if (!tree.has(yr)) tree.set(yr, new Map());
      const yMap = tree.get(yr);
      if (!yMap.has(mo)) yMap.set(mo, new Map());
      const mMap = yMap.get(mo);
      if (!mMap.has(day)) mMap.set(day, { count: 0, rawVals: new Set() });
      const de = mMap.get(day);
      de.count++;
      de.rawVals.add(raw);
    }

    let h = '';

    // =========================================================
    // YEAR MODE
    // =========================================================
    if (dg === 'year') {
      // Compute per-year counts for count sort
      const yrCountMap = new Map();
      for (const [yr, yMap] of tree) { let c = 0; for (const [,mMap] of yMap) for (const [,de] of mMap) c += de.count; yrCountMap.set(yr, c); }
      const years = [...tree.keys()].sort(function(a, b) {
        if (sb === 'count') {
          const diff = yrCountMap.get(b) - yrCountMap.get(a);
          return diff !== 0 ? diff : b - a; // secondary: newest year first
        }
        return b - a;
      });
      if (sb === 'count' && blankCount > 0) {
        let p = 0; while (p < years.length && yrCountMap.get(years[p]) >= blankCount) p++;
        years.splice(p, 0, null);
      }
      if (blankCount > 0) countW = Math.max(countW, cctx.measureText(String(blankCount)).width + PAD);
      for (const yr of years) {
        if (yr === null) continue;
        valW = Math.max(valW, cctx.measureText(String(yr)).width + PAD);
        const yMap = tree.get(yr);
        for (const [mo, mMap] of yMap) {
          valW = Math.max(valW, cctx.measureText(MONTH_NAMES[mo] + ' ' + yr).width + PAD + 14);
          for (const [, de] of mMap) {
            countW = Math.max(countW, cctx.measureText(String(de.count)).width + PAD);
            for (const rv of de.rawVals) valW = Math.max(valW, cctx.measureText(rv).width + PAD + 28);
          }
        }
      }
      valW   = Math.min(300, Math.max(60, Math.ceil(valW)));
      countW = Math.min(200, Math.max(50, Math.ceil(countW)));
      pctW   = Math.min(200, Math.max(70, Math.ceil(pctW)));
      const colgroup = '<colgroup><col style="width:18px"><col style="width:' + valW + 'px">'
        + '<col style="width:' + countW + 'px"><col style="width:' + pctW + 'px"></colgroup>';
      h = '<table class="ip-tbl">' + colgroup + '<thead><tr>'
        + '<th class="ip-col-toggle"></th><th>' + esc(priHeader) + '</th>'
        + '<th class="ip-col-count">Count</th><th class="ip-col-pct">Count (%)</th>'
        + '</tr></thead><tbody>';

      for (const yr of years) {
        if (yr === null) {
          const bp = total ? ((blankCount / total) * 100).toFixed(1) : '0.0';
          h += '<tr class="ip-row-primary"><td></td><td>(blank)</td><td class="ip-col-count">' + blankCount + '</td><td class="ip-col-pct">' + bp + '%</td></tr>';
          continue;
        }
        const yrKey = 'yr:' + yr;
        const yrExpanded = Insp.expanded.has(yrKey);
        const yMap = tree.get(yr);
        let yrCount = 0; const yrRaw = [];
        for (const [, mMap] of yMap) for (const [, de] of mMap) { yrCount += de.count; for (const rv of de.rawVals) yrRaw.push(rv); }
        const yrPct = total ? ((yrCount / total) * 100).toFixed(1) : '0.0';
        const yrRawJ = ea(JSON.stringify(yrRaw));
        h += '<tr class="ip-row-primary" onclick="inspToggleYrMo(\'' + yrKey + '\')">'
           + '<td class="ip-col-toggle" style="cursor:pointer">' + (yrExpanded ? '&#9660;' : '&#9654;') + '</td>'
           + '<td style="cursor:pointer">' + yr + '</td>'
           + '<td class="ip-col-count" onclick="event.stopPropagation();inspApplySetFilter(' + priColJ + ',' + yrRawJ + ')" title="Filter to ' + yr + '" style="cursor:pointer">' + yrCount + '</td>'
           + '<td class="ip-col-pct" onclick="event.stopPropagation();inspApplySetFilter(' + priColJ + ',' + yrRawJ + ')" title="Filter to ' + yr + '" style="cursor:pointer">' + yrPct + '%</td>'
           + '</tr>';
        if (yrExpanded) {
          const months = [...yMap.keys()].sort(function(a, b) { return a - b; });
          for (const mo of months) {
            const moKey = 'mo:' + yr + ':' + mo;
            const moExpanded = Insp.expanded.has(moKey);
            const mMap = yMap.get(mo);
            let moCount = 0; const moRaw = [];
            for (const [, de] of mMap) { moCount += de.count; for (const rv of de.rawVals) moRaw.push(rv); }
            const moPct = total ? ((moCount / total) * 100).toFixed(1) : '0.0';
            const moRawJ = ea(JSON.stringify(moRaw));
            const moLabel = MONTH_NAMES[mo] + ' ' + yr;
            h += '<tr class="ip-row-secondary" onclick="inspToggleYrMo(\'' + moKey + '\')">'
               + '<td class="ip-col-toggle" style="cursor:pointer;padding-left:14px">' + (moExpanded ? '&#9660;' : '&#9654;') + '</td>'
               + '<td style="cursor:pointer;padding-left:14px">' + esc(moLabel) + '</td>'
               + '<td class="ip-col-count" onclick="event.stopPropagation();inspApplySetFilter(' + priColJ + ',' + moRawJ + ')" title="Filter to ' + esc(moLabel) + '" style="cursor:pointer">' + moCount + '</td>'
               + '<td class="ip-col-pct" onclick="event.stopPropagation();inspApplySetFilter(' + priColJ + ',' + moRawJ + ')" title="Filter to ' + esc(moLabel) + '" style="cursor:pointer">' + moPct + '%</td>'
               + '</tr>';
            if (moExpanded) {
              const days = [...mMap.keys()].sort(function(a, b) { return a - b; });
              for (const day of days) {
                const de = mMap.get(day);
                const dayPct = total ? ((de.count / total) * 100).toFixed(1) : '0.0';
                const dayRawJ = ea(JSON.stringify([...de.rawVals]));
                h += '<tr class="ip-row-secondary" onclick="inspApplySetFilter(' + priColJ + ',' + dayRawJ + ')" style="cursor:pointer">'
                   + '<td></td><td style="padding-left:28px">' + esc([...de.rawVals][0] || '') + '</td>'
                   + '<td class="ip-col-count">' + de.count + '</td>'
                   + '<td class="ip-col-pct">' + dayPct + '%</td></tr>';
              }
            }
          }
        }
      }

    // =========================================================
    // MONTH MODE  (Month+Year is the top grouping)
    // =========================================================
    } else if (dg === 'month') {
      // Flatten to moKey → { yr, mo, count, mMap }  sorted newest-first
      const moEntries = [];
      for (const [yr, yMap] of tree) {
        for (const [mo, mMap] of yMap) {
          let moCount = 0; const moRaw = [];
          for (const [, de] of mMap) { moCount += de.count; for (const rv of de.rawVals) moRaw.push(rv); }
          moEntries.push({ yr, mo, count: moCount, raw: moRaw, mMap });
        }
      }
      moEntries.sort(function(a, b) {
        const byVal = a.yr !== b.yr ? b.yr - a.yr : b.mo - a.mo; // newest first
        if (sb !== 'count') return byVal;
        const diff = b.count - a.count;
        return diff !== 0 ? diff : byVal; // secondary: newest month first
      });
      if (sb === 'count' && blankCount > 0) {
        let p = 0; while (p < moEntries.length && moEntries[p].count >= blankCount) p++;
        moEntries.splice(p, 0, null);
      }
      if (blankCount > 0) countW = Math.max(countW, cctx.measureText(String(blankCount)).width + PAD);
      for (const me of moEntries) {
        if (me === null) continue;
        const moLabel = MONTH_NAMES[me.mo] + ' ' + me.yr;
        valW = Math.max(valW, cctx.measureText(moLabel).width + PAD);
        countW = Math.max(countW, cctx.measureText(String(me.count)).width + PAD);
        for (const [, de] of me.mMap) for (const rv of de.rawVals) valW = Math.max(valW, cctx.measureText(rv).width + PAD + 14);
      }
      valW   = Math.min(300, Math.max(60, Math.ceil(valW)));
      countW = Math.min(200, Math.max(50, Math.ceil(countW)));
      pctW   = Math.min(200, Math.max(70, Math.ceil(pctW)));
      const colgroup = '<colgroup><col style="width:18px"><col style="width:' + valW + 'px">'
        + '<col style="width:' + countW + 'px"><col style="width:' + pctW + 'px"></colgroup>';
      h = '<table class="ip-tbl">' + colgroup + '<thead><tr>'
        + '<th class="ip-col-toggle"></th><th>' + esc(priHeader) + '</th>'
        + '<th class="ip-col-count">Count</th><th class="ip-col-pct">Count (%)</th>'
        + '</tr></thead><tbody>';

      for (const me of moEntries) {
        if (me === null) {
          const bp = total ? ((blankCount / total) * 100).toFixed(1) : '0.0';
          h += '<tr class="ip-row-primary"><td></td><td>(blank)</td><td class="ip-col-count">' + blankCount + '</td><td class="ip-col-pct">' + bp + '%</td></tr>';
          continue;
        }
        const moKey = 'mo:' + me.yr + ':' + me.mo;
        const moExpanded = Insp.expanded.has(moKey);
        const moPct = total ? ((me.count / total) * 100).toFixed(1) : '0.0';
        const moRawJ = ea(JSON.stringify(me.raw));
        const moLabel = MONTH_NAMES[me.mo] + ' ' + me.yr;
        h += '<tr class="ip-row-primary" onclick="inspToggleYrMo(\'' + moKey + '\')">'
           + '<td class="ip-col-toggle" style="cursor:pointer">' + (moExpanded ? '&#9660;' : '&#9654;') + '</td>'
           + '<td style="cursor:pointer">' + esc(moLabel) + '</td>'
           + '<td class="ip-col-count" onclick="event.stopPropagation();inspApplySetFilter(' + priColJ + ',' + moRawJ + ')" title="Filter to ' + esc(moLabel) + '" style="cursor:pointer">' + me.count + '</td>'
           + '<td class="ip-col-pct" onclick="event.stopPropagation();inspApplySetFilter(' + priColJ + ',' + moRawJ + ')" title="Filter to ' + esc(moLabel) + '" style="cursor:pointer">' + moPct + '%</td>'
           + '</tr>';
        if (moExpanded) {
          const days = [...me.mMap.keys()].sort(function(a, b) { return a - b; });
          for (const day of days) {
            const de = me.mMap.get(day);
            const dayPct = total ? ((de.count / total) * 100).toFixed(1) : '0.0';
            const dayRawJ = ea(JSON.stringify([...de.rawVals]));
            h += '<tr class="ip-row-secondary" onclick="inspApplySetFilter(' + priColJ + ',' + dayRawJ + ')" style="cursor:pointer">'
               + '<td></td><td style="padding-left:14px">' + esc([...de.rawVals][0] || '') + '</td>'
               + '<td class="ip-col-count">' + de.count + '</td>'
               + '<td class="ip-col-pct">' + dayPct + '%</td></tr>';
          }
        }
      }

    // =========================================================
    // DATE MODE  (flat list of raw values, sorted chronologically)
    // =========================================================
    } else {
      // Flat list: raw → { ms, count }
      const dateMap = new Map();
      for (const row of dataRows) {
        const raw = row[priCol] || '';
        if (!raw) continue;
        const ms = parseDateToMs(raw);
        if (ms === null) continue;
        if (!dateMap.has(raw)) dateMap.set(raw, { ms, count: 0 });
        dateMap.get(raw).count++;
      }
      const dateEntries = [...dateMap.entries()].sort(function(a, b) {
        if (sb !== 'count') return a[1].ms - b[1].ms; // chronological
        const diff = b[1].count - a[1].count;
        return diff !== 0 ? diff : a[1].ms - b[1].ms; // secondary: chronological
      });
      if (sb === 'count' && blankCount > 0) {
        let p = 0; while (p < dateEntries.length && dateEntries[p][1].count >= blankCount) p++;
        dateEntries.splice(p, 0, [null, { count: blankCount }]);
      }
      if (blankCount > 0) countW = Math.max(countW, cctx.measureText(String(blankCount)).width + PAD);
      for (const [rv, de] of dateEntries) {
        if (rv === null) continue;
        valW = Math.max(valW, cctx.measureText(rv).width + PAD);
        countW = Math.max(countW, cctx.measureText(String(de.count)).width + PAD);
      }
      valW   = Math.min(300, Math.max(60, Math.ceil(valW)));
      countW = Math.min(200, Math.max(50, Math.ceil(countW)));
      pctW   = Math.min(200, Math.max(70, Math.ceil(pctW)));
      const colgroup = '<colgroup><col style="width:18px"><col style="width:' + valW + 'px">'
        + '<col style="width:' + countW + 'px"><col style="width:' + pctW + 'px"></colgroup>';
      h = '<table class="ip-tbl">' + colgroup + '<thead><tr>'
        + '<th class="ip-col-toggle"></th><th>' + esc(priHeader) + '</th>'
        + '<th class="ip-col-count">Count</th><th class="ip-col-pct">Count (%)</th>'
        + '</tr></thead><tbody>';

      for (const [rv, de] of dateEntries) {
        if (rv === null) {
          const bp = total ? ((blankCount / total) * 100).toFixed(1) : '0.0';
          h += '<tr class="ip-row-primary"><td></td><td>(blank)</td><td class="ip-col-count">' + blankCount + '</td><td class="ip-col-pct">' + bp + '%</td></tr>';
          continue;
        }
        const pct = total ? ((de.count / total) * 100).toFixed(1) : '0.0';
        const rvJ = ea(JSON.stringify([rv]));
        h += '<tr class="ip-row-primary" onclick="inspApplySetFilter(' + priColJ + ',' + rvJ + ')" style="cursor:pointer">'
           + '<td></td><td>' + esc(rv) + '</td>'
           + '<td class="ip-col-count">' + de.count + '</td>'
           + '<td class="ip-col-pct">' + pct + '%</td></tr>';
      }
    }

    // Blank row — only render at bottom for Values sort; Count sort injects it inline above
    if (blankCount > 0 && sb !== 'count') {
      const blankPct = total ? ((blankCount / total) * 100).toFixed(1) : '0.0';
      h += '<tr class="ip-row-primary"><td></td><td>(blank)</td>'
         + '<td class="ip-col-count">' + blankCount + '</td>'
         + '<td class="ip-col-pct">' + blankPct + '%</td></tr>';
    }
    h += '<tr class="ip-row-total"><td></td><td>Total</td>'
       + '<td class="ip-col-count">' + total + '</td>'
       + '<td class="ip-col-pct">100%</td></tr>';
    h += '</tbody></table>';
    wrap.innerHTML = h;
    return;
  }
  // ---- END DATE COLUMN ----
  if (dgEl) dgEl.style.display = 'none';
  // Show and sync Sort By toggle for non-date columns
  const sgElN = document.getElementById('ip-sort-group');
  if (sgElN) {
    sgElN.style.display = 'flex';
    sgElN.querySelectorAll('button').forEach(function(b) {
      b.classList.toggle('idg-on', b.id === 'isg-' + Insp.sortBy);
    });
  }

  // Group: priVal → { count, subs: secVal → count }
  const groups = new Map();
  for (let i = 0; i < dataRows.length; i++) {
    const row = dataRows[i];
    const pv = row[priCol] || '';
    if (!groups.has(pv)) groups.set(pv, { count: 0, subs: new Map() });
    const g = groups.get(pv);
    g.count++;
    if (secCol !== null) {
      const sv = row[secCol] || '';
      g.subs.set(sv, (g.subs.get(sv) || 0) + 1);
    }
  }

  // Sort primary groups; blank always last; Count has secondary value sort
  const sorted = [...groups.entries()].sort(function(a, b) {
    const aBlank = a[0] === '', bBlank = b[0] === '';
    if (aBlank && !bBlank) return 1;
    if (!aBlank && bBlank) return -1;
    const byVal = String(a[0]).localeCompare(String(b[0]), undefined, { numeric: true, sensitivity: 'base' });
    if (Insp.sortBy === 'values') return byVal;
    const byCount = b[1].count - a[1].count;
    return byCount !== 0 ? byCount : byVal; // secondary: value order
  });
  const priHeader = rows[0][priCol] || ('Col ' + priCol);
  const secHeader = secCol !== null ? (rows[0][secCol] || ('Col ' + secCol)) : '';

  // Measure column widths the same way the primary grid does (max 200px)
  const cvs = document.createElement('canvas');
  const cctx = cvs.getContext('2d');
  cctx.font = '12px "Segoe UI", sans-serif';
  const PAD = 16; // 8px left + 8px right padding
  let valW = cctx.measureText(priHeader + (secHeader ? ' / ' + secHeader : '')).width + PAD;
  let countW = cctx.measureText('Count').width + PAD;
  let pctW = cctx.measureText('Count (%)').width + PAD;
  for (const [pv, g] of groups) {
    valW = Math.max(valW, cctx.measureText(pv || '(blank)').width + PAD);
    countW = Math.max(countW, cctx.measureText(String(g.count)).width + PAD);
    if (secCol !== null) {
      for (const sv of g.subs.keys()) {
        valW = Math.max(valW, cctx.measureText(sv || '(blank)').width + PAD + 14);
      }
    }
  }
  valW   = Math.min(300, Math.max(60,  Math.ceil(valW)));
  countW = Math.min(200, Math.max(50,  Math.ceil(countW)));
  pctW   = Math.min(200, Math.max(70,  Math.ceil(pctW)));
  const colgroup = '<colgroup><col style="width:18px"><col style="width:' + valW + 'px">'
    + '<col style="width:' + countW + 'px"><col style="width:' + pctW + 'px"></colgroup>';

  let h = '<table class="ip-tbl">' + colgroup + '<thead><tr>'
    + '<th class="ip-col-toggle"></th>'
    + '<th>' + esc(priHeader) + (secCol !== null ? ' / ' + esc(secHeader) : '') + '</th>'
    + '<th class="ip-col-count">Count</th>'
    + '<th class="ip-col-pct">Count (%)</th>'
    + '</tr></thead><tbody>';

  for (let gi = 0; gi < sorted.length; gi++) {
    const [pv, g] = sorted[gi];
    const expanded = Insp.expanded.has(pv);
    const canExpand = secCol !== null;
    const pct = total ? ((g.count / total) * 100).toFixed(1) : '0.0';
    const pvJ = ea(JSON.stringify(pv));
    const priColJ = ea(JSON.stringify(priCol));
    const toggle = canExpand ? (expanded ? '&#9660;' : '&#9654;') : '';
    const pvEsc = esc(pv || '(blank)');
    const filterCall = 'event.stopPropagation();inspApplyFilterAndSwitch(' + priColJ + ',' + pvJ + ',null,null)';
    h += '<tr class="ip-row-primary"' + (canExpand ? ' onclick="inspToggle(' + pvJ + ')"' : '') + '>'
       + '<td class="ip-col-toggle" style="cursor:' + (canExpand ? 'pointer' : 'default') + '">' + toggle + '</td>'
       + '<td style="cursor:' + (canExpand ? 'pointer' : 'default') + '">' + pvEsc + '</td>'
       + '<td class="ip-col-count" onclick="' + filterCall + '" title="Filter to this group" style="cursor:pointer">' + g.count + '</td>'
       + '<td class="ip-col-pct" onclick="' + filterCall + '" title="Filter to this group" style="cursor:pointer">' + pct + '%</td>'
       + '</tr>';
    if (canExpand && expanded) {
      const subs = [...g.subs.entries()].sort(function(a, b) { return b[1] - a[1]; });
      const secColJ = ea(JSON.stringify(secCol));
      for (let si = 0; si < subs.length; si++) {
        const [sv, sc] = subs[si];
        const spct = total ? ((sc / total) * 100).toFixed(1) : '0.0';
        const svJ = ea(JSON.stringify(sv));
        h += '<tr class="ip-row-secondary" onclick="inspApplyFilterAndSwitch(' + priColJ + ',' + pvJ + ',' + secColJ + ',' + svJ + ')">'
           + '<td></td>'
           + '<td style="padding-left:22px">' + esc(sv || '(blank)') + '</td>'
           + '<td class="ip-col-count">' + sc + '</td>'
           + '<td class="ip-col-pct">' + spct + '%</td>'
           + '</tr>';
      }
    }
  }
  h += '<tr class="ip-row-total"><td></td><td>Total</td>'
     + '<td class="ip-col-count">' + total + '</td>'
     + '<td class="ip-col-pct">100%</td></tr>';
  h += '</tbody></table>';
  wrap.innerHTML = h;
}

function inspToggle(pv) {
  if (Insp.expanded.has(pv)) Insp.expanded.delete(pv); else Insp.expanded.add(pv);
  renderInspTable();
}

function inspToggleYrMo(key) {
  if (Insp.expanded.has(key)) Insp.expanded.delete(key); else Insp.expanded.add(key);
  renderInspTable();
}

function inspApplySetFilter(priCol, pvArr) {
  S.filters = {};
  S.filters[priCol] = new Set(pvArr);
  syncFilterBtns(); refreshRows();
  toggleInspect();
}

function inspSetDateGroup(g) {
  Insp.dateGroup = g;
  Insp.expanded = new Set(); // reset expand state when switching grouping
  renderInspTable();
}

function inspSetSortBy(s) {
  Insp.sortBy = s;
  renderInspTable();
}

function inspExpandAll(open) {
  if (!S.rows || S.rows.length < 2 || !Insp.sumby.length) return;
  Insp.expanded = new Set();
  if (open) {
    const priCol = Insp.sumby[0];
    if (colIsDateType(priCol)) {
      const dg = Insp.dateGroup || 'year';
      for (let r = 1; r < S.rows.length; r++) {
        const raw = S.rows[r][priCol] || '';
        if (!raw) continue;
        const ms = parseDateToMs(raw);
        if (ms === null) continue;
        const d = new Date(ms);
        const yr = d.getUTCFullYear(), mo = d.getUTCMonth();
        if (dg === 'year') { Insp.expanded.add('yr:' + yr); Insp.expanded.add('mo:' + yr + ':' + mo); }
        else if (dg === 'month') { Insp.expanded.add('mo:' + yr + ':' + mo); }
        // date mode: no nesting to expand
      }
    } else {
      for (let r = 1; r < S.rows.length; r++) Insp.expanded.add(S.rows[r][priCol] || '');
    }
  }
  renderInspTable();
}

function inspApplyFilterAndSwitch(priCol, pv, secCol, sv) {
  // Apply filters then go back to data view
  S.filters = {};
  if (pv !== null) { S.filters[priCol] = new Set([pv]); }
  if (secCol !== null && sv !== null) { S.filters[secCol] = new Set([sv]); }
  syncFilterBtns(); refreshRows();
  toggleInspect();
}


function inspRemove(zone, col) {
  Insp[zone] = Insp[zone].filter(function(c) { return c !== col; });
  renderInspect();
}

// Drag-and-drop: fields list → zones and between pills
function ipFieldDragStart(e, col) {
  ipDragSrc = { col: col, zone: null };
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', String(col));
}

function inspToggleField(col) {
  if (Insp.sumby.includes(col)) { inspRemove('sumby', col); return; }
  if (Insp.fav.includes(col)) { inspRemove('fav', col); return; }
  inspClickField(col);
}

function inspClickField(col) {
  const inUse = new Set([...Insp.fav, ...Insp.sumby]);
  if (inUse.has(col)) return;
  if (Insp.sumby.length >= 2) return; // already at max
  const isPrimary = Insp.sumby.length === 0;
  Insp.sumby.push(col);
  Insp.expanded = new Set();
  if (isPrimary) Insp.sortBy = colIsDateType(col) ? 'values' : 'count';
  renderInspect();
}

function ipPillDragStart(e, col, zone) {
  ipDragSrc = { col: col, zone: zone };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(col));
  setTimeout(function() { e.target.classList.add('ip-pill-dragging'); }, 0);
}

function ipPillDragEnd(col, zone) {
  document.querySelectorAll('.ip-pill-dragging').forEach(function(p) { p.classList.remove('ip-pill-dragging'); });
  if (ipDragSrc) { // still set means no drop zone consumed the drag
    inspRemove(zone, col);
    ipDragSrc = null;
  }
}

function ipToggleSec(sec) {
  ipSecOpen[sec] = !ipSecOpen[sec];
  const body = document.getElementById('ip-' + sec + '-body');
  const toggle = document.getElementById('ip-' + sec + '-toggle');
  if (body) body.style.display = ipSecOpen[sec] ? '' : 'none';
  if (toggle) toggle.innerHTML = ipSecOpen[sec] ? '&#9660;' : '&#9654;';
}

function ipClearDropIndicators() {
  document.querySelectorAll('#ip-sumby-list .ip-pill').forEach(function(p) {
    p.classList.remove('dz-above', 'dz-below');
  });
}

// Wire up drop zones after DOM ready
function ipWireDropZones() {
  // Fav drop zone (empty placeholder)
  const favDz = document.getElementById('ip-fav-dz');
  if (favDz) {
    favDz.addEventListener('dragover', function(e) { e.preventDefault(); favDz.classList.add('dz-over'); });
    favDz.addEventListener('dragleave', function(e) {
      if (!favDz.contains(e.relatedTarget)) favDz.classList.remove('dz-over');
    });
    favDz.addEventListener('drop', function(e) {
      e.preventDefault(); favDz.classList.remove('dz-over');
      ipDropIntoZone('fav', parseInt(e.dataTransfer.getData('text/plain'), 10));
    });
  }
  // Fav pill list (append on drop)
  const favList = document.getElementById('ip-fav-list');
  if (favList) {
    favList.addEventListener('dragover', function(e) { e.preventDefault(); });
    favList.addEventListener('drop', function(e) {
      e.preventDefault();
      ipDropIntoZone('fav', parseInt(e.dataTransfer.getData('text/plain'), 10));
    });
  }
  // Sumby drop zone (empty placeholder)
  const sumbyDz = document.getElementById('ip-sumby-dz');
  if (sumbyDz) {
    sumbyDz.addEventListener('dragover', function(e) { e.preventDefault(); sumbyDz.classList.add('dz-over'); });
    sumbyDz.addEventListener('dragleave', function(e) {
      if (!sumbyDz.contains(e.relatedTarget)) sumbyDz.classList.remove('dz-over');
    });
    sumbyDz.addEventListener('drop', function(e) {
      e.preventDefault(); sumbyDz.classList.remove('dz-over');
      ipSumbyDropTarget = null;
      ipDropSumby(parseInt(e.dataTransfer.getData('text/plain'), 10));
    });
  }
  // Sumby pill list — enhanced dragover with position indicator
  const sumbyList = document.getElementById('ip-sumby-list');
  if (sumbyList) {
    sumbyList.addEventListener('dragover', function(e) {
      e.preventDefault();
      ipClearDropIndicators();
      const pills = [...sumbyList.querySelectorAll('.ip-pill')];
      ipSumbyDropTarget = null;
      if (!pills.length) return;
      // Find the pill the cursor is closest to and determine before/after
      let target = pills[pills.length - 1];
      let before = false;
      for (let i = 0; i < pills.length; i++) {
        const rect = pills[i].getBoundingClientRect();
        if (e.clientY < rect.top + rect.height / 2) {
          target = pills[i]; before = true; break;
        }
      }
      target.classList.add(before ? 'dz-above' : 'dz-below');
      ipSumbyDropTarget = { el: target, before: before };
    });
    sumbyList.addEventListener('dragleave', function(e) {
      if (!sumbyList.contains(e.relatedTarget)) {
        ipClearDropIndicators();
        ipSumbyDropTarget = null;
      }
    });
    sumbyList.addEventListener('drop', function(e) {
      e.preventDefault();
      ipClearDropIndicators();
      ipDropSumby(parseInt(e.dataTransfer.getData('text/plain'), 10));
    });
  }
}

function ipDropIntoZone(zone, col) {
  if (isNaN(col)) return;
  document.querySelectorAll('.ip-pill-dragging').forEach(function(p) { p.classList.remove('ip-pill-dragging'); });
  // Remove col from source zone if moving between zones
  if (ipDragSrc && ipDragSrc.zone && ipDragSrc.zone !== zone) {
    Insp[ipDragSrc.zone] = Insp[ipDragSrc.zone].filter(function(c) { return c !== col; });
  }
  const list = Insp[zone];
  if (list.indexOf(col) >= 0) { ipDragSrc = null; renderInspect(); return; }
  list.push(col);
  ipDragSrc = null;
  renderInspect();
}

function ipDropSumby(col) {
  if (isNaN(col)) { ipSumbyDropTarget = null; return; }
  document.querySelectorAll('.ip-pill-dragging').forEach(function(p) { p.classList.remove('ip-pill-dragging'); });
  const srcZone = ipDragSrc ? ipDragSrc.zone : null;
  const oldPrimary = Insp.sumby[0];
  // Remove col from source zone
  if (srcZone === 'fav') Insp.fav = Insp.fav.filter(function(c) { return c !== col; });
  // Remove col from sumby so we can re-insert at the right position
  Insp.sumby = Insp.sumby.filter(function(c) { return c !== col; });
  // Enforce max 2
  if (Insp.sumby.length >= 2) { ipDragSrc = null; ipSumbyDropTarget = null; renderInspect(); return; }
  // Determine insertion index
  let insertIdx = Insp.sumby.length; // default: append
  if (ipSumbyDropTarget) {
    const targetCol = parseInt(ipSumbyDropTarget.el.dataset.col, 10);
    const idx = Insp.sumby.indexOf(targetCol);
    if (idx >= 0) insertIdx = ipSumbyDropTarget.before ? idx : idx + 1;
  }
  Insp.sumby.splice(insertIdx, 0, col);
  // Set default sort when the primary field changes
  const newPrimary = Insp.sumby[0];
  if (newPrimary !== oldPrimary) Insp.sortBy = colIsDateType(newPrimary) ? 'values' : 'count';
  ipDragSrc = null;
  ipSumbyDropTarget = null;
  renderInspect();
}

document.addEventListener('DOMContentLoaded', function() {
  ipWireDropZones();
});
</script>
<div id="sel-handle"></div>
</body>
</html>
