// so that hover-open is suppressed (click required) for those columns.
function computeLargeTextCols(mySession) {
  if (loadingSession !== mySession) return;
  const nc = S.rows.length ? S.rows[0].length : 0;
  const result = new Set();
  for (let c = 0; c < nc; c++) {
    if (colIsDateType(c)) continue;
    // sample up to 20 values to detect numeric columns
    let sampled = 0, numHits = 0;
    for (let r = 1; r < S.rows.length && sampled < 20; r++) {
      const v = S.rows[r][c]; if (!v) continue; sampled++;
      const cleaned = (v).replace(/[$,\s]/g, '');
      if (cleaned !== '' && isFinite(Number(cleaned))) numHits++;
    }
    if (sampled > 0 && numHits / sampled >= 0.6) continue;
    // count distinct text values; bail as soon as we exceed 1000
    const seen = new Set();
    for (let r = 1; r < S.rows.length; r++) {
      const v = S.rows[r][c]; if (!v) continue;
      seen.add(v);
      if (seen.size > 1000) { result.add(c); break; }
    }
  }
  largeTextCols = result;
  document.querySelectorAll('#gh th[data-c]').forEach(function(th) {
    th.classList.toggle('large-text-hdr', largeTextCols.has(+th.dataset.c));
  });
}

// ── Filter ────────────────────────────────────────────────────────────────────

// Hover open: small delay so brushing past headers doesn't flash the panel.
function scheduleFilterOpen(th, col) {
  clearTimeout(filterOpenTimer);
  clearTimeout(filterCloseTimer);
  filterOpenTimer = setTimeout(function() {
    const btn = th.querySelector('.fb') || th;
    if (largeTextCols.has(col)) {
      openSearchFilterEl(btn, col);
    } else {
      document.body.style.cursor = 'progress';
      const tok = ++filterComputeToken;
      setTimeout(function() {
        if (filterComputeToken !== tok) { document.body.style.cursor = ''; return; }
        openFilterEl(btn, col, tok);
      }, 0);
    }
  }, 80);
}

function scheduleFilterClose() {
  clearTimeout(filterOpenTimer);
  filterComputeToken++;             // abandon any in-progress hover computation
  document.body.style.cursor = '';  // restore cursor if we were showing progress
  filterCloseTimer = setTimeout(function() {
    if (popup && popup.matches(':hover')) return;
    closePopup();
  }, 220);
}

function cancelFilterClose() {
  clearTimeout(filterCloseTimer);
}

// Click on the ▾ button: if filter is active (blue) → clear it; otherwise toggle panel.
function openFilter(e, col) {
  e.stopPropagation();
  if (e.currentTarget.classList.contains('on')) { clearFilter(col); return; }
  if (popup && parseInt(popup.dataset.col, 10) === col) { closePopup(); return; }
  const btn = e.currentTarget;
  if (largeTextCols.has(col)) {
    openSearchFilterEl(btn, col);
  } else {
    openFilterEl(btn, col);
  }
}

// Search-only popup for large-text (1000+ distinct value) columns.
function openSearchFilterEl(btn, col) {
  closePopup();

  // Snapshot filter state so Esc can restore it.
  popupSavedState = { col: col, searchFilter: S.searchFilters[col] };

  // Count distinct values (cached); shown next to "Load all values".
  const countKey = activeTabIdx + ':' + col;
  if (filterCountCache[countKey] === undefined) {
    if (filterValCache[countKey]) {
      filterCountCache[countKey] = filterValCache[countKey].length;
    } else {
      const cs = new Set();
      for (let r = 1; r < S.rows.length; r++) { const v = S.rows[r][col]; if (v !== undefined && v !== null && v !== '') cs.add(v); }
      filterCountCache[countKey] = cs.size;
    }
  }
  const countLabel = filterCountCache[countKey].toLocaleString();

  const rect = btn.getBoundingClientRect();
  const thEl = btn.closest ? btn.closest('th') : null;
  const thRect = thEl ? thEl.getBoundingClientRect() : rect;
  const div = document.createElement('div');
  div.className = 'fpop';
  const left = Math.max(0, Math.min(thRect.left, window.innerWidth - 210));
  let top = rect.bottom + 2;
  if (top + 120 > window.innerHeight) top = Math.max(0, rect.top - 122);
  div.style.cssText = 'left:' + left + 'px;top:' + top + 'px';
  div.dataset.col = col;
  const currentQ = S.searchFilters[col] || '';
  div.innerHTML = '<input class="fsrch" placeholder="Type to search…" value="' + ea(currentQ) + '">'
    + '<div class="fload"><button onclick="loadAllValsForCol(event,' + col + ')">Load all values (' + countLabel + ')</button></div>';
  document.body.appendChild(div);
  popup = div;
  div.addEventListener('mouseenter', cancelFilterClose);
  div.addEventListener('mouseleave', scheduleFilterClose);
  const inp = div.querySelector('.fsrch');
  inp.focus();
  inp.selectionStart = inp.selectionEnd = inp.value.length;
  inp.addEventListener('input', function() {
    const q = inp.value;
    if (q) S.searchFilters[col] = q; else delete S.searchFilters[col];
    syncFilterBtns(); refreshRows();
    if (inspectOpen) renderInspect();
  });
}

// "Load all values" inside the search popup — switches to full checkbox list.
function loadAllValsForCol(e, col) {
  e.preventDefault(); e.stopPropagation();
  closePopup();
  delete S.searchFilters[col];
  syncFilterBtns(); refreshRows();
  if (inspectOpen) renderInspect();
  const th = document.querySelector('#gh th[data-c="' + col + '"]');
  const btn = (th && th.querySelector('.fb')) || th || document.body;
  document.body.style.cursor = 'wait';
  setTimeout(function() { openFilterEl(btn, col); }, 0);
}

function openFilterEl(anchorEl, col, tok) {
  // If called from hover and the mouse has already left, bail out.
  if (tok !== undefined && filterComputeToken !== tok) { document.body.style.cursor = ''; return; }
  if (popup && parseInt(popup.dataset.col, 10) === col) { document.body.style.cursor = ''; return; }
  closePopup();

  // Snapshot filter state so Esc can restore it.
  popupSavedState = {
    col: col,
    filter: S.filters[col] ? new Set(S.filters[col]) : undefined,
    dateFilter: S.dateFilters[col] ? Object.assign({}, S.dateFilters[col]) : undefined,
    numFilter: S.numFilters[col] ? Object.assign({}, S.numFilters[col]) : undefined,
    searchFilter: S.searchFilters[col]
  };

  const rect = anchorEl.getBoundingClientRect();
  const thEl = anchorEl.closest ? anchorEl.closest('th') : null;
  const thRect = thEl ? thEl.getBoundingClientRect() : rect;
  const _cacheKey = activeTabIdx + ':' + col;
  let vals;
  if (!colIsDateType(col) && largeTextCols.has(col) && filterValCache[_cacheKey]) {
    vals = filterValCache[_cacheKey];
  } else {
    const seen = new Set();
    for (var ri = 1; ri < S.rows.length; ri++) {
      if (passesFiltersExcept(ri, col)) seen.add(S.rows[ri][col] ?? '');
    }
    vals = [...seen].sort(function(a, b) {
      const na = parseFloat((a || '').replace(/[$,]/g, ''));
      const nb = parseFloat((b || '').replace(/[$,]/g, ''));
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      return (a || '').localeCompare(b || '', undefined, { numeric: true });
    });
    if (!colIsDateType(col) && largeTextCols.has(col)) filterValCache[_cacheKey] = vals;
  }
  const cur = S.filters[col];
  const curDf = S.dateFilters[col];

  const div = document.createElement('div');
  div.className = 'fpop';
  const left = Math.max(0, Math.min(thRect.left, window.innerWidth - 210));
  let top = rect.bottom + 2;
  if (top + 320 > window.innerHeight) top = Math.max(0, rect.top - Math.min(320, vals.length * 26 + 90) - 2);
  div.style.cssText = 'left:' + left + 'px;top:' + top + 'px';

  if (colIsDateType(col)) {
    // ── Date column: year / month / day tree ─────────────────────────────────
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const tree = {};
    vals.forEach(function(v) {
      const ms = parseDateToMs(v);
      if (ms === null) return;
      const dt = new Date(ms);
      const yr = dt.getFullYear(), mo = dt.getMonth(), dy = dt.getDate();
      if (!tree[yr]) tree[yr] = {};
      if (!tree[yr][mo]) tree[yr][mo] = [];
      tree[yr][mo].push({ raw: v, day: dy });
    });
    const years = Object.keys(tree).map(Number).sort(function(a, b) { return b - a; });
    const daysVal = curDf && curDf.days ? curDf.days : '';
    const srchVal = S.searchFilters[col] || '';

    let html = '<input class="fsrch" id="fdat-srch" placeholder="Search…" value="' + ea(srchVal) + '">'
      + '<div class="fdt-last">'
      + '<label>In the last</label>'
      + '<input type="number" id="fdt-days" min="1" max="9999" value="' + daysVal + '">'
      + '<label>days</label></div>'
      + '<div class="flist">'
      + '<div class="fitem" data-v="__ALL__"><input type="checkbox" id="fa"><label for="fa"><em>(Select All)</em></label></div>';

    years.forEach(function(yr) {
      const months = Object.keys(tree[yr]).map(Number).sort(function(a, b) { return a - b; });
      const yrOpen = false;
      html += '<div class="ftnode" data-yr="' + yr + '">'
        + '<div class="ftnode-row">'
        + '<span class="ftnode-toggle">' + (yrOpen ? '▼' : '▶') + '</span>'
        + '<input type="checkbox" class="ftnode-cb" data-level="year" data-yr="' + yr + '">'
        + '<label class="ftnode-lbl">' + yr + '</label>'
        + '</div>'
        + '<div class="ftnode-children' + (yrOpen ? '' : ' collapsed') + '">';
      months.forEach(function(mo) {
        const days = tree[yr][mo].slice().sort(function(a, b) { return a.day - b.day; });
        const moOpen = false;
        html += '<div class="ftnode" data-yr="' + yr + '" data-mo="' + mo + '">'
          + '<div class="ftnode-row">'
          + '<span class="ftnode-toggle">' + (moOpen ? '▼' : '▶') + '</span>'
          + '<input type="checkbox" class="ftnode-cb" data-level="month" data-yr="' + yr + '" data-mo="' + mo + '">'
          + '<label class="ftnode-lbl">' + MONTHS[mo] + '</label>'
          + '</div>'
          + '<div class="ftnode-children' + (moOpen ? '' : ' collapsed') + '">';
        days.forEach(function(d) {
          const ck = (!curDf && cur && cur.size && cur.has(d.raw)) ? 'checked' : '';
          html += '<div class="fitem" data-v="' + ea(d.raw) + '">'
            + '<input type="checkbox" class="ftleaf" value="' + ea(d.raw) + '" ' + ck + '>'
            + '<label>' + esc(d.raw) + '</label></div>';
        });
        html += '</div></div>';
      });
      html += '</div></div>';
    });
    html += '</div>';
    div.innerHTML = html;

    div.dataset.col = col;
    document.body.appendChild(div);
    popup = div;
    document.body.style.cursor = '';
    div.addEventListener('mouseenter', cancelFilterClose);
    div.addEventListener('mouseleave', scheduleFilterClose);

    ftUpdateParents(div);

    // Date search input — filters actual rows via searchFilters and trims the tree visually
    const dateSrch = div.querySelector('#fdat-srch');
    if (dateSrch) {
      dateSrch.focus();
      dateSrch.selectionStart = dateSrch.selectionEnd = dateSrch.value.length;
      dateSrch.addEventListener('input', function() {
        const q = dateSrch.value;
        if (q) S.searchFilters[col] = q; else delete S.searchFilters[col];
        syncFilterBtns(); refreshRows();
        if (inspectOpen) renderInspect();
        // Visually filter tree leaves, check matching ones, hide empty parent nodes
        const ql = q.toLowerCase();
        div.querySelectorAll('.fitem[data-v]').forEach(function(item) {
          if (item.dataset.v === '__ALL__') return;
          const matches = !ql || item.dataset.v.toLowerCase().includes(ql);
          item.style.display = matches ? '' : 'none';
          const cb = item.querySelector('.ftleaf');
          if (cb) cb.checked = matches && !!ql;
        });
        div.querySelectorAll('.ftnode[data-mo]').forEach(function(node) {
          const anyVisible = [...node.querySelectorAll('.fitem[data-v]:not([data-v="__ALL__"])')].some(function(el) { return el.style.display !== 'none'; });
          node.style.display = anyVisible ? '' : 'none';
          if (anyVisible && ql) { const ch = node.querySelector('.ftnode-children'); if (ch) { ch.classList.remove('collapsed'); const tog = node.querySelector('.ftnode-toggle'); if (tog) tog.textContent = '▼'; } }
        });
        div.querySelectorAll('.ftnode:not([data-mo])').forEach(function(node) {
          const anyVisible = [...node.querySelectorAll('.ftnode[data-mo]')].some(function(el) { return el.style.display !== 'none'; });
          node.style.display = anyVisible ? '' : 'none';
          if (anyVisible && ql) { const ch = node.querySelector('.ftnode-children'); if (ch) { ch.classList.remove('collapsed'); const tog = node.querySelector('.ftnode-toggle'); if (tog) tog.textContent = '▼'; } }
        });
        ftUpdateParents(div);
      });
    }

    // Expand / collapse toggle arrows
    div.querySelectorAll('.ftnode-toggle').forEach(function(tog) {
      tog.addEventListener('click', function(e) {
        e.stopPropagation();
        const node = tog.closest('.ftnode');
        const children = node && node.querySelector(':scope > .ftnode-children');
        if (!children) return;
        if (children.classList.contains('collapsed')) {
          children.classList.remove('collapsed'); tog.textContent = '▼';
        } else {
          children.classList.add('collapsed'); tog.textContent = '▶';
        }
      });
    });

    // Year / month node checkboxes
    div.querySelectorAll('.ftnode-cb').forEach(function(cb) {
      cb.addEventListener('change', function(e) {
        e.stopPropagation();
        const node = cb.closest('.ftnode');
        if (node) node.querySelectorAll('.ftleaf').forEach(function(lf) { lf.checked = cb.checked; });
        ftUpdateParents(div);
        liveApplyDateFilter(col, div);
        const daysIn = div.querySelector('#fdt-days');
        if (daysIn) daysIn.value = '';
      });
      const lbl = cb.nextElementSibling;
      if (lbl && lbl.classList.contains('ftnode-lbl')) {
        lbl.addEventListener('click', function(e) {
          e.stopPropagation();
          cb.checked = !cb.checked;
          cb.dispatchEvent(new Event('change'));
        });
      }
    });

    // Leaf (day) checkboxes
    div.querySelectorAll('.ftleaf').forEach(function(cb) {
      cb.addEventListener('change', function() {
        ftUpdateParents(div);
        liveApplyDateFilter(col, div);
        const daysIn = div.querySelector('#fdt-days');
        if (daysIn) daysIn.value = '';
      });
      var item = cb.closest('.fitem');
      if (item) item.addEventListener('mousedown', function(e) {
        if (e.target === cb || e.target.tagName === 'LABEL') return;
        e.preventDefault(); cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
      });
    });

    // Select All
    const allCb = div.querySelector('#fa');
    if (allCb) {
      allCb.addEventListener('change', function() {
        div.querySelectorAll('.ftleaf').forEach(function(lf) { lf.checked = allCb.checked; });
        div.querySelectorAll('.ftnode-cb').forEach(function(cb) { cb.checked = allCb.checked; cb.indeterminate = false; });
        liveApplyDateFilter(col, div);
        const daysIn = div.querySelector('#fdt-days');
        if (daysIn) daysIn.value = '';
      });
    }

    // "In the last X days" — apply on Enter or focus-away
    const daysIn = div.querySelector('#fdt-days');
    if (daysIn) {
      function applyDaysFilter() {
        const n = parseInt(daysIn.value, 10);
        if (n >= 1) {
          S.dateFilters[col] = { days: n };
          delete S.filters[col];
          div.querySelectorAll('.ftleaf').forEach(function(lf) { lf.checked = false; });
          div.querySelectorAll('.ftnode-cb').forEach(function(cb) { cb.checked = false; cb.indeterminate = false; });
          if (allCb) { allCb.checked = false; allCb.indeterminate = false; }
        } else {
          delete S.dateFilters[col];
        }
        syncFilterBtns(); refreshRows();
        if (inspectOpen) renderInspect();
      }
      daysIn.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); applyDaysFilter(); } });
      daysIn.addEventListener('blur', applyDaysFilter);
    }

  } else {
    // ── Non-date column: flat checkbox list (+ "Greater than" for numeric cols) ─
    const isNumCol = colIsNumType(col);
    const curNf = S.numFilters[col];
    const gtVal = curNf && curNf.gt !== undefined ? curNf.gt : '';

    div.innerHTML = '<input class="fsrch" placeholder="Search…" oninput="fltSearch(this)">'
      + (isNumCol
        ? '<div class="fdt-last">'
          + '<label>Greater than</label>'
          + '<input type="number" id="fnum-gt" value="' + gtVal + '">'
          + '</div>'
        : '')
      + '<div class="flist">'
      + '<div class="fitem" data-v="__ALL__"><input type="checkbox" id="fa" ' + (cur && cur.size && vals.every(function(v) { return cur.has(v); }) ? 'checked' : '') + '>'
      + '<label for="fa"><em>(Select All)</em></label></div>'
      + vals.map(function(v, i) {
          return '<div class="fitem" data-v="' + ea(v) + '">'
            + '<input type="checkbox" id="fv' + i + '" value="' + ea(v) + '" '
            + (cur && cur.size && cur.has(v) ? 'checked' : '') + '>'
            + '<label for="fv' + i + '">' + (v === '' ? '<em style="color:#aaa">(blank)</em>' : esc(fmtCell(v))) + '</label></div>';
        }).join('')
      + '</div>';

    div.dataset.col = col;
    document.body.appendChild(div);
    popup = div;
    document.body.style.cursor = '';
    div.addEventListener('mouseenter', cancelFilterClose);
    div.addEventListener('mouseleave', scheduleFilterClose);

    const allCb = div.querySelector('#fa');
    const itemCbs = [...div.querySelectorAll('.flist input[type=checkbox]:not(#fa)')];
    allCb.addEventListener('change', function() {
      itemCbs.forEach(function(cb) { cb.checked = allCb.checked; });
      liveApplyFilter(col);
      const gtIn = div.querySelector('#fnum-gt');
      if (gtIn) { gtIn.value = ''; delete S.numFilters[col]; }
    });
    itemCbs.forEach(function(cb) {
      cb.addEventListener('change', function() {
        allCb.checked = itemCbs.every(function(x) { return x.checked; });
        liveApplyFilter(col);
        const gtIn = div.querySelector('#fnum-gt');
        if (gtIn) { gtIn.value = ''; delete S.numFilters[col]; }
      });
      var item = cb.closest('.fitem');
      if (item) item.addEventListener('mousedown', function(e) {
        if (e.target === cb || e.target.tagName === 'LABEL') return;
        e.preventDefault(); cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
      });
    });

    // "Greater than X" input for numeric columns
    const gtIn = div.querySelector('#fnum-gt');
    if (gtIn) {
      function applyGtFilter() {
        const raw = gtIn.value.trim();
        const n = parseFloat(raw.replace(/[$,]/g, ''));
        if (raw !== '' && !isNaN(n)) {
          S.numFilters[col] = { gt: n };
          delete S.filters[col];
          // Check and show values that pass the threshold; hide those that don't.
          itemCbs.forEach(function(cb) {
            const v = parseFloat((cb.value || '').replace(/[$,]/g, ''));
            const passes = !isNaN(v) && v > n;
            cb.checked = passes;
            const item = cb.closest('.fitem');
            if (item) item.style.display = passes ? '' : 'none';
          });
          const anyVisible = itemCbs.some(function(cb) {
            const item = cb.closest('.fitem');
            return item && item.style.display !== 'none';
          });
          if (allCb) { allCb.checked = anyVisible; allCb.indeterminate = false; }
        } else {
          delete S.numFilters[col];
          // Restore all items to visible and unchecked.
          itemCbs.forEach(function(cb) {
            cb.checked = false;
            const item = cb.closest('.fitem');
            if (item) item.style.display = '';
          });
          if (allCb) { allCb.checked = false; allCb.indeterminate = false; }
        }
        syncFilterBtns(); refreshRows();
        if (inspectOpen) renderInspect();
      }
      gtIn.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); applyGtFilter(); } });
      gtIn.addEventListener('blur', applyGtFilter);
    }
  }

  // Spacebar toggles the hovered .fitem (works for both flat list and tree leaves).
  div.addEventListener('keydown', function(e) {
    if (e.key !== ' ') return;
    const hovered = div.querySelector('.fitem:hover');
    if (!hovered) return;
    e.preventDefault();
    const cb = hovered.querySelector('input[type=checkbox]');
    if (!cb) return;
    cb.checked = !cb.checked;
    cb.dispatchEvent(new Event('change'));
  });
}

function fltSearch(inp) {
  const t = inp.value.toLowerCase();
  popup.querySelectorAll('.fitem').forEach(item => {
    if (item.dataset.v === '__ALL__') return;
    item.style.display = item.dataset.v.toLowerCase().includes(t) ? '' : 'none';
  });
}

function liveApplyFilter(col) {
  if (!popup) return;
  const cbs = [...popup.querySelectorAll('.flist input[type=checkbox]:not(#fa)')];
  if (cbs.every(function(cb) { return cb.checked; })) delete S.filters[col];
  else S.filters[col] = new Set(cbs.filter(function(cb) { return cb.checked; }).map(function(cb) { return cb.value; }));
  syncFilterBtns(); refreshRows();
  if (inspectOpen) renderInspect();
}

function applyFilter(col) {
  liveApplyFilter(col);
  closePopup();
}

function colIsDateType(col) {
  let hits = 0, total = 0;
  for (let r = 1; r < S.rows.length && total < 60; r++) {
    const v = S.rows[r][col];
    if (!v) continue;
    total++;
    if (parseDateToMs(v) !== null) hits++;
  }
  return total >= 3 && hits / total >= 0.6;
}

function colIsNumType(col) {
  let hits = 0, total = 0;
  for (let r = 1; r < S.rows.length && total < 60; r++) {
    const v = S.rows[r][col];
    if (!v) continue;
    total++;
    if (isNumeric(v)) hits++;
  }
  return total >= 3 && hits / total >= 0.6;
}

function ftUpdateParents(div) {
  div.querySelectorAll('.ftnode[data-mo]').forEach(function(mNode) {
    const leaves = [...mNode.querySelectorAll('.ftleaf')];
    const cb = mNode.querySelector(':scope > .ftnode-row .ftnode-cb');
    if (!cb) return;
    const all = leaves.every(function(l) { return l.checked; });
    const some = leaves.some(function(l) { return l.checked; });
    cb.checked = all; cb.indeterminate = !all && some;
  });
  div.querySelectorAll('.ftnode:not([data-mo])').forEach(function(yNode) {
    const leaves = [...yNode.querySelectorAll('.ftleaf')];
    const cb = yNode.querySelector(':scope > .ftnode-row .ftnode-cb');
    if (!cb) return;
    const all = leaves.every(function(l) { return l.checked; });
    const some = leaves.some(function(l) { return l.checked; });
    cb.checked = all; cb.indeterminate = !all && some;
  });
  const allLeaves = [...div.querySelectorAll('.ftleaf')];
  const allCb = div.querySelector('#fa');
  if (allCb) {
    const all = allLeaves.every(function(l) { return l.checked; });
    const some = allLeaves.some(function(l) { return l.checked; });
    allCb.checked = all; allCb.indeterminate = !all && some;
  }
}

function liveApplyDateFilter(col, div) {
  delete S.dateFilters[col];
  const leaves = [...div.querySelectorAll('.ftleaf')];
  if (leaves.every(function(l) { return l.checked; })) delete S.filters[col];
  else S.filters[col] = new Set(leaves.filter(function(l) { return l.checked; }).map(function(l) { return l.value; }));
  syncFilterBtns(); refreshRows();
  if (inspectOpen) renderInspect();
}

function clearFilter(col) {
  delete S.filters[col]; delete S.dateFilters[col]; delete S.numFilters[col]; delete S.searchFilters[col]; closePopup(); syncFilterBtns(); refreshRows();
  if (inspectOpen) renderInspect();
}

function clearAllFilters() {
  S.filters = {}; S.dateFilters = {}; S.numFilters = {}; S.searchFilters = {};
  S.rowSel.clear();
  const tb = document.getElementById('tb');
  if (tb) tb.querySelectorAll('tr.rs').forEach(function(tr) { tr.classList.remove('rs'); });
  clearCellSel();
  syncFilterBtns();
  refreshRows();
  if (inspectOpen) renderInspect();
}

function syncFilterBtns() {
  document.querySelectorAll('.fb').forEach((btn, i) => {
    btn.classList.toggle('on', !!(S.filters[i] && S.filters[i].size) || !!(S.dateFilters[i] && S.dateFilters[i].days) || !!(S.numFilters[i] && S.numFilters[i].gt !== undefined) || !!S.searchFilters[i]);
  });
  const bcf = document.getElementById('bcf');
  if (!bcf) return;
  const active = hasActiveFilter();
  bcf.disabled = !active;
  bcf.classList.toggle('pri', active);
}

function closePopup() { if (popup) { popup.remove(); popup = null; } popupSavedState = null; }

// Enter → confirm and close; Esc → restore pre-open state and close.
document.addEventListener('keydown', function(e) {
  if (!popup) return;
  if (e.key !== 'Enter' && e.key !== 'Escape') return;
  // Let numeric / date range inputs handle their own Enter.
  if (e.key === 'Enter' && e.target && e.target.closest && e.target.closest('.fdt-last')) return;
  e.preventDefault();
  if (e.key === 'Escape' && popupSavedState) {
    const col = popupSavedState.col;
    if ('searchFilter' in popupSavedState) {
      if (popupSavedState.searchFilter !== undefined) S.searchFilters[col] = popupSavedState.searchFilter;
      else delete S.searchFilters[col];
    }
    if ('filter' in popupSavedState) {
      if (popupSavedState.filter) S.filters[col] = popupSavedState.filter;
      else delete S.filters[col];
    }
    if ('dateFilter' in popupSavedState) {
      if (popupSavedState.dateFilter) S.dateFilters[col] = popupSavedState.dateFilter;
      else delete S.dateFilters[col];
    }
    if ('numFilter' in popupSavedState) {
      if (popupSavedState.numFilter) S.numFilters[col] = popupSavedState.numFilter;
      else delete S.numFilters[col];
    }
    syncFilterBtns(); refreshRows();
    if (inspectOpen) renderInspect();
  }
  closePopup();
});

// ── Column resize ─────────────────────────────────────────────────────────────
function updateTableWidth() {
  let total = 42 + 38; // row-number col + phantom col
  for (let i = 0; i < S.widths.length; i++) total += S.widths[i];
  const gt = document.getElementById('gt');
  if (gt) gt.style.width = total + 'px';
}

let rz = null;
function startRz(e, col) {
  e.preventDefault(); e.stopPropagation();
  rz = { col, x0: e.clientX, w0: S.widths[col] };
  const move = ev => {
    const w = Math.max(30, rz.w0 + ev.clientX - rz.x0);
    S.widths[rz.col] = w;
    const el = document.getElementById('cw' + rz.col);
    if (el) el.style.width = w + 'px';
    updateTableWidth();
  };
  const up = () => { rz = null; document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

// ── Cell editing ──────────────────────────────────────────────────────────────
function clickCell(e, r, c) {
  if (editing) commitEdit();
  S.rowSel.clear();
  document.querySelectorAll('tr.rs').forEach(tr => tr.classList.remove('rs'));
  setCellSel(r, c, r, c);
}

function editCell(r, c) {
  if (editing) commitEdit();
  if (popup) closePopup();
  const td = document.querySelector('td[data-r="' + r + '"][data-c="' + c + '"]');
  if (!td || td.dataset.phRow) return;
  S.active = { r, c };
  const val = S.rows[r][c] || '';
  td.style.overflow = 'visible'; td.style.position = 'relative';
  const inp = document.createElement('input');
  inp.className = 'ce'; inp.value = val;
  if (isNumeric(val)) inp.style.textAlign = 'right';
  inp.onblur = () => commitEdit();
  inp.onkeydown = editKey;
  // Stop all mouse events from bubbling to the td/gw handlers so they can't
  // commit the edit or steal focus while the user clicks inside the input.
  const _sp = ev => ev.stopPropagation();
  inp.addEventListener('mousedown', _sp);
  inp.addEventListener('click',     _sp);
  inp.addEventListener('dblclick',  _sp);
  td.innerHTML = ''; td.appendChild(inp);
  inp.focus(); inp.select();
  editing = { r, c, td, old: val };
}

function commitEdit() {
  if (!editing) return;
  const { r, c, td, old } = editing; editing = null;
  const inp = td.querySelector('input');
  const val = inp ? inp.value : old;
  if (val !== old) snapshot();
  S.rows[r][c] = val;
  td.style.overflow = ''; td.style.position = '';
  td.innerHTML = '<div class="cv">' + renderCell(val) + '</div>';
  td.classList.toggle('nr', isNumeric(val));
  td.classList.toggle('dt', !isNumeric(val) && parseDateToMs(val) !== null);
  td.classList.add('ac');
  if (val !== old) { S.dirty = true; setTitle(); S.widths = calcColWidths(S.rows); buildGrid(); }
}

function editKey(e) {
  if (e.key === 'Enter')       { e.preventDefault(); e.stopPropagation(); commitEdit(); moveActive(1, 0); }
  else if (e.key === 'Tab')        { e.preventDefault(); e.stopPropagation(); commitEdit(); moveActive(0, e.shiftKey ? -1 : 1); }
  else if (e.key === 'ArrowDown')  { e.preventDefault(); e.stopPropagation(); commitEdit(); moveActive(1, 0); }
  else if (e.key === 'ArrowUp')    { e.preventDefault(); e.stopPropagation(); commitEdit(); moveActive(-1, 0); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); e.stopPropagation(); commitEdit(); moveActive(0, 1); }
  else if (e.key === 'ArrowLeft')  { e.preventDefault(); e.stopPropagation(); commitEdit(); moveActive(0, -1); }
  else if (e.key === 'Escape') {
    e.stopPropagation();
    const { r, c, td, old } = editing; editing = null;
    td.style.overflow = ''; td.style.position = '';
    td.innerHTML = '<div class="cv">' + renderCell(old) + '</div>';
    td.classList.add('ac');
  }
}

function shiftMove(dr, dc) {
  if (!S.active || !vis.length) return;
  clearColSel();
  const nc = S.rows[0].length;
  const sel = S.cellSel;
  // Cursor is the corner opposite the anchor
  const cr = sel ? (S.active.r === sel.r1 ? sel.r2 : sel.r1) : S.active.r;
  const cc = sel ? (S.active.c === sel.c1 ? sel.c2 : sel.c1) : S.active.c;
  const vi = visMap.get(cr < 0 ? 0 : cr);
  if (vi === undefined) return;
  let newCr = cr, newCc = cc;

  if (dc > 0 && cc + dc >= nc) {
    // Shift+Right past last column — add untitled column, extend selection
    snapshot();
    const anchorR = S.active.r, anchorC = S.active.c;
    const n = nextUntitled();
    S.rows[0].push('Untitled ' + n);
    for (let r = 1; r < S.rows.length; r++) S.rows[r].push('');
    S.widths.push(80);
    S.dirty = true; setTitle();
    S.cellSel = null; S.active = null;
    buildGrid();
    S.active = { r: anchorR, c: anchorC };
    newCr = cr; newCc = nc;
  } else if (dr > 0 && vi === vis.length - 1 && vis[vi] === S.rows.length - 1) {
    // Shift+Down past last row — add row, extend selection
    snapshot();
    const anchorR = S.active.r, anchorC = S.active.c;
    const newR2 = S.rows.length;
    S.rows.push(Array(nc).fill(''));
    S.dirty = true; setTitle();
    S.cellSel = null; S.active = null;
    refreshRowsKeeping(newR2);
    S.active = { r: anchorR, c: anchorC };
    newCr = newR2; newCc = cc;
  } else {
    const newVi = Math.max(0, Math.min(vis.length - 1, vi + dr));
    newCr = vis[newVi];
    newCc = Math.max(0, Math.min(nc - 1, cc + dc));
    ensureRendered(newVi);
  }

  S.cellSel = {
    r1: Math.min(S.active.r, newCr), c1: Math.min(S.active.c, newCc),
    r2: Math.max(S.active.r, newCr), c2: Math.max(S.active.c, newCc),
  };
  S.rowSel.clear();
  updateSelDOM();
  const td = document.querySelector('td[data-r="' + newCr + '"][data-c="' + newCc + '"]');
  scrollCellIntoView(td);
}

function scrollCellIntoView(el) {
  if (!el) return;
  el.scrollIntoView({ block: 'nearest', inline: 'nearest' });
  // scrollIntoView has no knowledge of the 42px sticky row-number column on the
  // left. It stops as soon as the cell's left edge reaches the container edge,
  // leaving the cell hidden behind td.rn. Correct the horizontal overhang.
  const gw = document.getElementById('gw');
  const overhang = (gw.getBoundingClientRect().left + 42) - el.getBoundingClientRect().left;
  if (overhang > 0) gw.scrollLeft = Math.max(0, gw.scrollLeft - overhang);
}

function moveActive(dr, dc) {
  if (!S.active || !vis.length) return;
  const vi = visMap.get(S.active.r);
  if (vi === undefined) return;
  const nc = S.rows[0].length;

  // Tab past last column — auto-add an untitled column
  if (dc > 0 && S.active.c + dc >= nc) {
    snapshot();
    const newC = nc, newR = S.active.r;
    S.cellSel = null; S.active = null;
    const n = nextUntitled();
    S.rows[0].push('Untitled ' + n);
    for (let r = 1; r < S.rows.length; r++) S.rows[r].push('');
    S.widths.push(80);
    S.dirty = true; setTitle(); buildGrid();
    setCellSel(newR, newC, newR, newC);
    const t1 = document.querySelector('td[data-r="' + newR + '"][data-c="' + newC + '"]');
    scrollCellIntoView(t1);
    return;
  }

  // Down/Enter past the actual last row — auto-add a new row
  if (dr > 0 && vi === vis.length - 1 && vis[vi] === S.rows.length - 1) {
    snapshot();
    const newC = S.active.c;
    const newR = S.rows.length;
    S.cellSel = null; S.active = null;
    S.rows.push(Array(nc).fill(''));
    S.dirty = true; setTitle(); refreshRowsKeeping(newR);
    ensureRendered(vis.length - 1);
    setCellSel(newR, newC, newR, newC);
    const t2 = document.querySelector('td[data-r="' + newR + '"][data-c="' + newC + '"]');
    scrollCellIntoView(t2);
    return;
  }

  if (dr < 0 && vi === 0) {
    const col = S.active.c;
    S.cellSel = null; S.active = null;
    updateSelDOM();
    setColSel(col, col);
    updateSelStats();
    return;
  }
  const newVi = Math.max(0, Math.min(vis.length - 1, vi + dr));
  const newR = vis[newVi];
  const newC = Math.max(0, Math.min(nc - 1, S.active.c + dc));
  ensureRendered(newVi);
  setCellSel(newR, newC, newR, newC);
  const td = document.querySelector('td[data-r="' + newR + '"][data-c="' + newC + '"]');
  scrollCellIntoView(td);
}

function nextUntitled() {
  let max = 0;
  S.rows[0].forEach(function(h) {
    const m = h.match(/^Untitled (\d+)$/);
    if (m) max = Math.max(max, +m[1]);
  });
  return max + 1;
}

// ── Row selection (via row-number click) ──────────────────────────────────────
function clickRN(e, r) {
  if (editing) commitEdit();
  clearCellSel();
  if (e.ctrlKey || e.metaKey) {
    if (S.rowSel.has(r)) S.rowSel.delete(r); else S.rowSel.add(r);
  } else {
    if (S.rowSel.size === 1 && S.rowSel.has(r)) S.rowSel.clear();
    else { S.rowSel.clear(); S.rowSel.add(r); }
  }
  document.querySelectorAll('tr[data-r]').forEach(tr => {
    tr.classList.toggle('rs', S.rowSel.has(+tr.dataset.r));
  });
  updateSelStats();
}

function rnDragDown(e, r) {
  if (e.button !== 0) return;
  e.preventDefault();
  e.stopPropagation();
  if (editing) commitEdit();
  clearCellSel();
  if (e.ctrlKey || e.metaKey) {
    // Ctrl+click: toggle individual row, no drag
    if (S.rowSel.has(r)) S.rowSel.delete(r); else S.rowSel.add(r);
    rnDragStart = null; rnIsDragging = false;
  } else if (e.shiftKey && rnSelAnchor !== null) {
    // Shift+click: range-select from anchor to r
    const si = visMap.get(rnSelAnchor), ti = visMap.get(r);
    if (si !== undefined && ti !== undefined) {
      S.rowSel.clear();
      for (let vi = Math.min(si, ti); vi <= Math.max(si, ti); vi++) S.rowSel.add(vis[vi]);
    }
    rnDragStart = null; rnIsDragging = false;
  } else {
    // Normal click / drag start
    if (S.rowSel.size === 1 && S.rowSel.has(r)) {
      S.rowSel.clear();
      rnDragStart = null; rnIsDragging = false;
    } else {
      S.rowSel.clear();
      S.rowSel.add(r);
      rnDragStart = r;
      rnDragY0 = e.clientY;
      rnSelAnchor = r;
      rnIsDragging = false;
      rnDropIdx = undefined;
      document.body.classList.add('is-dragging');
    }
  }
  document.querySelectorAll('tr[data-r]').forEach(function(tr) {
    tr.classList.toggle('rs', S.rowSel.has(+tr.dataset.r));
  });
  updateSelStats();
}

// ── Phantom row/column ────────────────────────────────────────────────────────
function clickPhantomRN() {
  addDataRow();
  const newR = S.rows.length - 1;
  refreshRowsKeeping(newR);
  ensureRendered(vis.length - 1);
  editCell(newR, 0);
}

function clickPhantomCell(c) {
  addDataRow();
  const newR = S.rows.length - 1;
  refreshRowsKeeping(newR);
  ensureRendered(vis.length - 1);
  editCell(newR, c);
}

function addDataRow() {
  snapshot();
  S.rows.push(Array(S.rows[0].length).fill(''));
  S.dirty = true; setTitle();
}

function addColumn() {
  snapshot();
  const colName = 'Column ' + (S.rows[0].length + 1);
  S.rows[0].push(colName);
  for (let r = 1; r < S.rows.length; r++) S.rows[r].push('');
  S.widths.push(Math.min(200, Math.max(50, colName.length * 7 + 28)));
  S.dirty = true; setTitle();
  buildGrid();
  const newC = S.rows[0].length - 1;
  const ths = document.querySelectorAll('#gh th');
  if (ths[newC + 1]) startHeaderEdit(newC, ths[newC + 1]);
}

function editHeader(e, c) {
  e.stopPropagation();
  clearColSel();
  S.cellSel = null; S.active = null; S.rowSel.clear();
  updateSelDOM();
  startHeaderEdit(c, e.currentTarget.closest('th'));
}

function startHeaderEdit(c, th) {
  const old = S.rows[0][c];
  const thH = th.offsetHeight;
  th.innerHTML = '<textarea rows="1" style="position:absolute;top:0;left:0;right:0;'
    + 'border:none;outline:none;background:#fff;font:inherit;'
    + 'padding:3px 4px 3px 5px;box-sizing:border-box;resize:none;'
    + 'overflow:hidden;line-height:1.3;font-size:12px;color:#222;display:block;'
    + 'word-break:normal;overflow-wrap:anywhere;z-index:3;'
    + 'box-shadow:inset 0 0 0 2px var(--sel-border)"></textarea>';
  const inp = th.querySelector('textarea');
  inp.value = old;
  th.style.minHeight = thH + 'px';
  th.style.overflow = 'visible';
  const autoSize = () => { inp.style.height = '0'; inp.style.height = Math.max(thH, inp.scrollHeight) + 'px'; };
  autoSize();
  inp.addEventListener('input', autoSize);
  // Stop mouse events from reaching the #gh column-select handler.
  const _sp = ev => ev.stopPropagation();
  inp.addEventListener('mousedown', _sp);
  inp.addEventListener('click',     _sp);
  inp.addEventListener('dblclick',  _sp);
  inp.focus(); inp.select();
  let done = false;
  const commit = () => {
    if (done) return; done = true;
    const name = inp.value.trim() || old;
    if (name !== old) { snapshot(); S.rows[0][c] = name; S.dirty = true; setTitle(); S.widths = calcColWidths(S.rows); }
    buildGrid();
  };
  inp.onblur = commit;
  inp.onkeydown = ke => {
    if (ke.key === 'Enter') {
      ke.preventDefault();
      commit();
      if (vis.length) {
        const r = vis[0];
        S.rowSel.clear();
        ensureRendered(0);
        setCellSel(r, c, r, c);
        const td = document.querySelector('td[data-r="' + r + '"][data-c="' + c + '"]');
        scrollCellIntoView(td);
      }
    }
    else if (ke.key === 'Tab') {
      ke.preventDefault();
      commit();
      const nextC = ke.shiftKey ? c - 1 : c + 1;
      if (nextC >= 0 && nextC < S.rows[0].length) {
        const ths = document.querySelectorAll('#gh th');
        if (ths[nextC + 1]) startHeaderEdit(nextC, ths[nextC + 1]);
      } else if (!ke.shiftKey) {
        addColumn();
      }
    }
    else if (ke.key === 'ArrowDown') {
      ke.preventDefault();
      commit();
      if (vis.length) {
        const r = vis[0];
        S.rowSel.clear();
        ensureRendered(0);
        setCellSel(r, c, r, c);
        const td = document.querySelector('td[data-r="' + r + '"][data-c="' + c + '"]');
        scrollCellIntoView(td);
      }
    }
    else if (ke.key === 'Escape') { ke.preventDefault(); done = true; buildGrid(); }
  };
}

function headerContextMenu(e, c) {
  e.preventDefault();
  e.stopPropagation();
  if (popup) closePopup();
  // If right-clicking outside the current selection, reset to just this column
  if (!colSel || c < colSel.c1 || c > colSel.c2) { setColSel(c, c); updateSelStats(); }
  const count = colSel.c2 - colSel.c1 + 1;
  const x = Math.min(e.clientX, window.innerWidth - 165);
  const y = Math.min(e.clientY, window.innerHeight - 50);
  const div = document.createElement('div');
  div.className = 'ctxmenu';
  div.style.left = x + 'px';
  div.style.top  = y + 'px';
  const label = count > 1 ? 'Delete ' + count + ' Columns' : 'Delete Column';
  div.innerHTML =
    '<div class="ctxitem" onclick="insertColumn()">Insert Column Left</div>' +
    '<div class="ctxitem danger" onclick="deleteColumns()">' + label + '</div>';
  document.body.appendChild(div);
  popup = div;
}

function rowContextMenu(e, r) {
  e.preventDefault();
  e.stopPropagation();
  if (popup) closePopup();
  if (!S.rowSel.has(r)) {
    S.rowSel.clear();
    S.rowSel.add(r);
    document.querySelectorAll('tr[data-r]').forEach(tr => {
      tr.classList.toggle('rs', S.rowSel.has(+tr.dataset.r));
    });
    updateSelStats();
  }
  const count = S.rowSel.size;
  const x = Math.min(e.clientX, window.innerWidth - 165);
  const y = Math.min(e.clientY, window.innerHeight - 50);
  const div = document.createElement('div');
  div.className = 'ctxmenu';
  div.style.left = x + 'px';
  div.style.top  = y + 'px';
  const label = count > 1 ? 'Delete ' + count + ' Rows' : 'Delete Row';
  div.innerHTML =
    '<div class="ctxitem" onclick="insertRow()">Insert Row Before</div>' +
    '<div class="ctxitem danger" onclick="delRows()">' + label + '</div>';
  document.body.appendChild(div);
  popup = div;
}

function deleteColumns() {
  closePopup();
  if (!colSel) return;
  const c1 = colSel.c1, c2 = colSel.c2, count = c2 - c1 + 1;
  if (S.rows[0].length <= count) { alert('Cannot delete all columns.'); return; }
  snapshot();
  for (let r = 0; r < S.rows.length; r++) S.rows[r].splice(c1, count);
  S.widths.splice(c1, count);
  const nf = {};
  for (const ci of Object.keys(S.filters)) {
    const n = +ci;
    if (n < c1) nf[n] = S.filters[ci];
    else if (n > c2) nf[n - count] = S.filters[ci];
  }
  S.filters = nf;
  if (S.sort) {
    if (S.sort.c >= c1 && S.sort.c <= c2) S.sort = null;
    else if (S.sort.c > c2) S.sort.c -= count;
  }
  clearColSel();
  S.cellSel = null; S.active = null; S.rowSel.clear();
  S.dirty = true; setTitle();
  buildGrid();
}

function insertColumn() {
  closePopup();
  if (!colSel) return;
  const c = colSel.c1; // insert LEFT of the leftmost selected column
  const colName = 'Column ' + (c + 1); // 1-based position label
  snapshot();
  S.rows[0].splice(c, 0, colName);
  for (let r = 1; r < S.rows.length; r++) S.rows[r].splice(c, 0, '');
  S.widths.splice(c, 0, Math.min(200, Math.max(50, colName.length * 7 + 28)));
  const nf = {}, nd = {}, nn = {};
  for (const ci of Object.keys(S.filters))     { const n = +ci; nf[n < c ? n : n + 1] = S.filters[ci]; }
  for (const ci of Object.keys(S.dateFilters)) { const n = +ci; nd[n < c ? n : n + 1] = S.dateFilters[ci]; }
  for (const ci of Object.keys(S.numFilters))  { const n = +ci; nn[n < c ? n : n + 1] = S.numFilters[ci]; }
  S.filters = nf; S.dateFilters = nd; S.numFilters = nn;
  if (S.sort && S.sort.c >= c) S.sort.c += 1;
  clearColSel();
  S.rowSel.clear(); S.cellSel = null; S.active = null;
  S.dirty = true; setTitle();
  buildGrid();
  // Open the header editor so the user can immediately rename the column
  const th = document.querySelector('#gh th[data-c="' + c + '"]');
  if (th) startHeaderEdit(c, th);
}

function delRows() {
  if (!S.rowSel.size) return;
  closePopup();
  snapshot();
  S.rows = S.rows.filter((_, i) => i === 0 || !S.rowSel.has(i));
  S.rowSel.clear(); S.dirty = true; setTitle(); refreshRows();
}

function insertRow() {
  closePopup();
  if (!S.rowSel.size) return;
  // Insert before the earliest selected row (minimum index, skip row 0 header)
  const minRow = Math.max(1, Math.min(...S.rowSel));
  snapshot();
  const blankRow = new Array(S.rows[0].length).fill('');
  S.rows.splice(minRow, 0, blankRow);
  clearColSel();
  S.rowSel.clear(); S.cellSel = null; S.active = null;
  S.dirty = true; setTitle(); refreshRows();
}

function hideDragLines() {
  document.getElementById('col-drag-line').style.display = 'none';
  document.getElementById('row-drag-line').style.display = 'none';
}

function moveColumn(fromC, toGap) {
  // toGap is the gap index 0..nc before which the column lands
  if (toGap === fromC || toGap === fromC + 1) return; // no-op: dropping on itself
  snapshot();
  // After removing fromC, the effective insert index shifts if moving right
  const insertAt = toGap > fromC ? toGap - 1 : toGap;
  // Move cell values in every row
  for (let r = 0; r < S.rows.length; r++) {
    const val = S.rows[r].splice(fromC, 1)[0];
    S.rows[r].splice(insertAt, 0, val);
  }
  // Move column width
  const w = S.widths.splice(fromC, 1)[0];
  S.widths.splice(insertAt, 0, w);
  // Remap column-based state
  function remapC(c) {
    if (c === fromC) return insertAt;
    if (fromC < insertAt && c > fromC && c <= insertAt) return c - 1;
    if (fromC > insertAt && c >= insertAt && c < fromC) return c + 1;
    return c;
  }
  const nf = {}, nd = {}, nn = {};
  for (const ci of Object.keys(S.filters))     nf[remapC(+ci)] = S.filters[ci];
  for (const ci of Object.keys(S.dateFilters)) nd[remapC(+ci)] = S.dateFilters[ci];
  for (const ci of Object.keys(S.numFilters))  nn[remapC(+ci)] = S.numFilters[ci];
  S.filters = nf; S.dateFilters = nd; S.numFilters = nn;
  if (S.sort) S.sort.c = remapC(S.sort.c);
  clearColSel();
  S.cellSel = null; S.active = null; S.rowSel.clear();
  S.dirty = true; setTitle();
  buildGrid();
  // Re-select the moved column
  setColSel(insertAt, insertAt);
  colSelAnchor = insertAt;
  updateSelStats();
}

function moveRow(fromR, toR) {
  // fromR: raw row index to move; toR: raw row index before which to insert (null = end)
  if (toR === fromR || toR === fromR + 1) return; // no-op: dropping on itself
  if (fromR === 0) return; // can't move the header row
  snapshot();
  const row = S.rows.splice(fromR, 1)[0];
  // Adjust insertion index after removal
  let insertAt;
  if (toR === null) {
    insertAt = S.rows.length; // append at end
  } else {
    insertAt = toR > fromR ? toR - 1 : toR;
    if (insertAt < 1) insertAt = 1; // keep header at 0
  }
  S.rows.splice(insertAt, 0, row);
  S.rowSel.clear(); S.cellSel = null; S.active = null;
  S.dirty = true; setTitle(); refreshRows();
  // Re-select the moved row
  S.rowSel.add(insertAt);
  document.querySelectorAll('tr[data-r]').forEach(function(tr) {
    tr.classList.toggle('rs', S.rowSel.has(+tr.dataset.r));
  });
  rnSelAnchor = insertAt;
  updateSelStats();
}

function clearSelCells() {
  if (!S.cellSel) return;
  snapshot();
  const { r1, c1, r2, c2 } = S.cellSel;
  for (let r = r1; r <= r2; r++) {
    if (!S.rows[r]) continue;
    for (let c = c1; c <= c2; c++) S.rows[r][c] = '';
  }
  S.dirty = true; setTitle(); refreshRows();
}

// ── Ctrl+Arrow navigation ─────────────────────────────────────────────────────
function cellFilled(val) {
  return val !== null && val !== undefined && val !== '';
}

function ctrlJumpC(row, fromC, dir) {
  const nc = S.rows[0].length;
  const bound = dir > 0 ? nc - 1 : 0;
  const nextC = fromC + dir;
  if (nextC < 0 || nextC >= nc) return fromC; // already at sheet edge
  const curFilled  = cellFilled(row[fromC]);
  const nextFilled = cellFilled(row[nextC]);
  if (!curFilled || !nextFilled) {
    // On empty OR at block edge: find next filled cell
    for (let j = nextC; dir > 0 ? j < nc : j >= 0; j += dir)
      if (cellFilled(row[j])) return j;
    return bound; // none found — land at sheet boundary
  }
  // Inside a filled run: jump to end of contiguous run
  let j = nextC;
  for (;;) {
    const jj = j + dir;
    if (jj < 0 || jj >= nc || !cellFilled(row[jj])) break;
    j = jj;
  }
  return j;
}

function ctrlJumpVi(fromVi, colC, dir) {
  const maxVi = vis.length - 1;
  const bound  = dir > 0 ? maxVi : 0;
  const nextVi = fromVi + dir;
  if (nextVi < 0 || nextVi > maxVi) return fromVi;
  const cell = vi => { const row = S.rows[vis[vi]]; return row ? row[colC] : null; };
  const curFilled  = cellFilled(cell(fromVi));
  const nextFilled = cellFilled(cell(nextVi));
  if (!curFilled || !nextFilled) {
    for (let i = nextVi; dir > 0 ? i <= maxVi : i >= 0; i += dir)
      if (cellFilled(cell(i))) return i;
    return bound;
  }
  let i = nextVi;
  for (;;) {
    const ii = i + dir;
    if (ii < 0 || ii > maxVi || !cellFilled(cell(ii))) break;
    i = ii;
  }
  return i;
}

function ctrlMove(dr, dc) {
  if (!S.active || !vis.length) return;
  const { r, c } = S.active;
  const vi = visMap.get(r);
  if (vi === undefined) return;
  let newR = r, newC = c, newVi = vi;
  if (dc !== 0) {
    newC = ctrlJumpC(S.rows[r] || [], c, dc);
  } else {
    newVi = ctrlJumpVi(vi, c, dr);
    newR = vis[newVi];
    ensureRendered(newVi);
  }
  // Position unchanged → already at a sheet boundary; delegate to the same
  // adjacent-element behaviour that plain Arrow uses at this boundary.
  if (newR === r && newC === c) {
    if (dr < 0) {
      // Ctrl+Up from first row → go to column header
      S.cellSel = null; S.active = null;
      updateSelDOM();
      setColSel(c, c);
      updateSelStats();
    } else if (dc < 0) {
      // Ctrl+Left from col 0 → select the current row
      clearCellSel();
      S.rowSel.clear();
      S.rowSel.add(r);
      document.querySelectorAll('tr[data-r]').forEach(function(tr) {
        tr.classList.toggle('rs', S.rowSel.has(+tr.dataset.r));
      });
      updateSelStats();
    }
    // Ctrl+Down / Ctrl+Right at the far boundary → no-op (don't auto-add)
    return;
  }
  S.rowSel.clear();
  setCellSel(newR, newC, newR, newC);
  const td = document.querySelector('td[data-r="' + newR + '"][data-c="' + newC + '"]');
  scrollCellIntoView(td);
}

function ctrlShiftMove(dr, dc) {
  if (!S.active || !vis.length) return;
  clearColSel();
  const sel = S.cellSel;
  // Cursor = corner opposite the anchor (same logic as shiftMove)
  const cr = sel ? (S.active.r === sel.r1 ? sel.r2 : sel.r1) : S.active.r;
  const cc = sel ? (S.active.c === sel.c1 ? sel.c2 : sel.c1) : S.active.c;
  const vi = visMap.get(cr < 0 ? 0 : cr);
  if (vi === undefined) return;
  let newCr = cr, newCc = cc;
  if (dc !== 0) {
    newCc = ctrlJumpC(S.rows[cr] || [], cc, dc);
  } else {
    const newVi = ctrlJumpVi(vi, cc, dr);
    newCr = vis[newVi];
    ensureRendered(newVi);
  }
  S.cellSel = {
    r1: Math.min(S.active.r, newCr), c1: Math.min(S.active.c, newCc),
    r2: Math.max(S.active.r, newCr), c2: Math.max(S.active.c, newCc),
  };
  S.rowSel.clear();
  updateSelDOM();
  const td = document.querySelector('td[data-r="' + newCr + '"][data-c="' + newCc + '"]');
  scrollCellIntoView(td);
}

// ── Row / column selection extension (Shift+Arrow) ───────────────────────────
function extendRowSel(dir) {
  if (!S.rowSel.size) return;
  const anchor = rnSelAnchor !== null ? rnSelAnchor : vis[dir > 0 ? 0 : vis.length - 1];
  const anchorVi = visMap.get(anchor);
  if (anchorVi === undefined) return;
  // Find vis index farthest from anchor within current selection
  let cursorVi = anchorVi;
  S.rowSel.forEach(function(r) {
    const vi = visMap.get(r);
    if (vi === undefined) return;
    if (Math.abs(vi - anchorVi) > Math.abs(cursorVi - anchorVi)) cursorVi = vi;
  });
  const newCursorVi = Math.max(0, Math.min(vis.length - 1, cursorVi + dir));
  const vMin = Math.min(anchorVi, newCursorVi), vMax = Math.max(anchorVi, newCursorVi);
  S.rowSel.clear();
  for (let vi = vMin; vi <= vMax; vi++) S.rowSel.add(vis[vi]);
  document.querySelectorAll('tr[data-r]').forEach(function(tr) {
    tr.classList.toggle('rs', S.rowSel.has(+tr.dataset.r));
  });
  updateSelStats();
  ensureRendered(newCursorVi);
}

function extendColSel(dir) {
  if (!colSel || !S.rows.length) return;
  const nc = S.rows[0].length;
  const anchor = colSelAnchor !== null ? colSelAnchor : colSel.c1;
  // Cursor is the column farthest from anchor
  const cursorC = Math.abs(colSel.c2 - anchor) >= Math.abs(colSel.c1 - anchor) ? colSel.c2 : colSel.c1;
  const newCursorC = Math.max(0, Math.min(nc - 1, cursorC + dir));
  setColSel(Math.min(anchor, newCursorC), Math.max(anchor, newCursorC));
  updateSelStats();
}

// ── Keyboard ─────────────────────────────────────────────────────────────────
function onKey(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'r') { e.preventDefault(); restartApp(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'w') {
    e.preventDefault();
    if (tabs.length > 0) closeTabWithConfirm(activeTabIdx);
    else fetch('/api/shutdown', { method: 'POST' }).catch(function(){});
    return;
  }
  // Close filter popup on Escape regardless of what has focus (e.g. the days input inside the pane).
  if (e.key === 'Escape' && popup) { e.preventDefault(); closePopup(); return; }
  if (editing) return;
  // Don't intercept keys while any text input / select has focus
  const ae = document.activeElement;
  if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT')) return;
  // Esc with no popup open and no active filter pane → clear all filters
  if (e.key === 'Escape' && !e.defaultPrevented && hasActiveFilter()) {
    e.preventDefault(); clearAllFilters(); return;
  }
  // Spacebar toggles hovered filter item even when the popup has no keyboard focus
  if (e.key === ' ' && popup && popup.dataset && popup.dataset.col !== undefined) {
    const hovered = popup.querySelector('.fitem:hover');
    if (hovered) {
      e.preventDefault();
      const cb = hovered.querySelector('input[type=checkbox]');
      if (cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); }
      return;
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile(false); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
    e.preventDefault();
    if (vis.length && S.rows[0].length) {
      setCellSel(vis[0], 0, vis[vis.length - 1], S.rows[0].length - 1);
      const td = document.querySelector('td[data-r="' + vis[0] + '"][data-c="0"]');
      if (td) scrollCellIntoView(td);
    }
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Tab') {
    e.preventDefault();
    if (tabs.length > 1) switchTab(e.shiftKey ? (activeTabIdx - 1 + tabs.length) % tabs.length : (activeTabIdx + 1) % tabs.length);
    return;
  }

  // Delete selected rows when rows are highlighted via row-number click
  if (e.key === 'Delete' && S.rowSel.size > 0 && !e.ctrlKey) {
    e.preventDefault(); delRows(); return;
  }

  // Shift+Arrow extends row selection
  if (S.rowSel.size > 0 && !S.cellSel && e.shiftKey && !e.ctrlKey) {
    if (e.key === 'ArrowDown') { e.preventDefault(); extendRowSel(1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); extendRowSel(-1); return; }
  }

  // Shift+Arrow extends column selection
  if (colSel && !S.cellSel && !S.rowSel.size && e.shiftKey && !e.ctrlKey) {
    if (e.key === 'ArrowRight') { e.preventDefault(); extendColSel(1); return; }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); extendColSel(-1); return; }
  }

  // Arrow navigation within the header row
  if (colSel && !S.active && !S.rowSel.size && !e.shiftKey && !e.ctrlKey) {
    const nc = S.rows[0].length;
    if (e.key === 'ArrowDown' && vis.length) {
      e.preventDefault();
      const col = colSel.c1;
      clearColSel();
      setCellSel(vis[0], col, vis[0], col);
      const td = document.querySelector('td[data-r="' + vis[0] + '"][data-c="' + col + '"]');
      if (td) scrollCellIntoView(td);
      return;
    }
    if (e.key === 'ArrowLeft' && colSel.c1 > 0) {
      e.preventDefault(); setColSel(colSel.c1 - 1, colSel.c1 - 1); updateSelStats(); return;
    }
    if (e.key === 'ArrowRight' && colSel.c1 < nc - 1) {
      e.preventDefault(); setColSel(colSel.c1 + 1, colSel.c1 + 1); updateSelStats(); return;
    }
  }

  // Typing with a single column selected → edit that column header
  if (colSel && colSel.c1 === colSel.c2 && !S.active && !S.cellSel) {
    if (e.key === 'F2' || (e.key.length === 1 && !e.ctrlKey && !e.altKey)) {
      e.preventDefault();
      const hc = colSel.c1;
      const th = document.querySelector('#gh th[data-c="' + hc + '"]');
      if (th) {
        clearColSel();
        S.cellSel = null; S.active = null; S.rowSel.clear();
        updateSelDOM();
        startHeaderEdit(hc, th);
        if (e.key.length === 1) {
          setTimeout(function() { const inp = th.querySelector('textarea'); if (inp) { inp.value = e.key; inp.setSelectionRange(1, 1); } }, 0);
        }
      }
      return;
    }
  }

  if (!S.active) return;
  const { r, c } = S.active;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (e.ctrlKey && e.shiftKey) ctrlShiftMove(1, 0);
    else if (e.ctrlKey) ctrlMove(1, 0);
    else if (e.shiftKey) shiftMove(1, 0);
    else moveActive(1, 0);
  }
  else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (e.ctrlKey && e.shiftKey) ctrlShiftMove(-1, 0);
    else if (e.ctrlKey) ctrlMove(-1, 0);
    else if (e.shiftKey) shiftMove(-1, 0);
    else moveActive(-1, 0);
  }
  else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (e.ctrlKey && e.shiftKey) ctrlShiftMove(0, 1);
    else if (e.ctrlKey) ctrlMove(0, 1);
    else if (e.shiftKey) shiftMove(0, 1);
    else moveActive(0, 1);
  }
  else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (e.ctrlKey && e.shiftKey) ctrlShiftMove(0, -1);
    else if (e.ctrlKey) ctrlMove(0, -1);
    else if (e.shiftKey) shiftMove(0, -1);
    else moveActive(0, -1);
  }
  else if (e.key === 'Tab')        { e.preventDefault(); moveActive(0, e.shiftKey ? -1 : 1); }
  else if (e.key === 'F2' || e.key === 'Enter') { editCell(r, c); }
  else if (e.key === 'Delete' && !e.ctrlKey) {
    if (S.cellSel && (S.cellSel.r1 !== S.cellSel.r2 || S.cellSel.c1 !== S.cellSel.c2)) {
      clearSelCells();
    } else {
      snapshot();
      S.rows[r][c] = ''; S.dirty = true; setTitle();
      const td = document.querySelector('td[data-r="' + r + '"][data-c="' + c + '"]');
      if (td) { td.innerHTML = '<div class="cv"></div>'; td.classList.add('ac'); }
    }
  } else if (e.key === 'Escape') {
    if (popup) { e.preventDefault(); closePopup(); return; }
    clearCellSel(); S.rowSel.clear();
    document.querySelectorAll('tr.rs').forEach(tr => tr.classList.remove('rs'));
    updateSelStats();
  } else if (e.key.length === 1 && !e.ctrlKey && !e.altKey) {
    editCell(r, c);
    setTimeout(() => { const inp = document.querySelector('.ce'); if (inp) inp.value = e.key; }, 0);
  }
}

// ── File I/O ─────────────────────────────────────────────────────────────────
function trimEmptyRowsAndCols() {
  const isBlank = function(v) { return v === '' || v === null || v === undefined; };
  let changed = false;

  // ── Drop all-blank data rows (never touch row 0 = header) ──────────────────
  const rowsBefore = S.rows.length;
  S.rows = S.rows.filter(function(row, i) {
    if (i === 0) return true;
    return row.some(function(v) { return !isBlank(v); });
  });
  if (S.rows.length !== rowsBefore) changed = true;

  // ── Drop all-blank columns whose header is a default name (e.g. "Column 7") ─
  const defaultColRe = /^Column \d+$/;
  const nc = S.rows[0].length;
  const removeSet = new Set();
  for (let c = 0; c < nc; c++) {
    if (!defaultColRe.test(S.rows[0][c] || '')) continue;
    if (S.rows.slice(1).every(function(row) { return isBlank(row[c]); })) removeSet.add(c);
  }
  if (removeSet.size > 0) {
    changed = true;
    // Build old→new column index map for remapping filters/sort
    const newIdx = [];
    let ni = 0;
    for (let c = 0; c < nc; c++) newIdx[c] = removeSet.has(c) ? -1 : ni++;
    S.rows    = S.rows.map(function(row) { return row.filter(function(_, c) { return !removeSet.has(c); }); });
    S.widths  = S.widths.filter(function(_, c) { return !removeSet.has(c); });
    function remapF(obj) {
      const out = {};
      for (const ci of Object.keys(obj)) {
        const n = +ci, mapped = newIdx[n];
        if (mapped !== undefined && mapped !== -1) out[mapped] = obj[ci];
      }
      return out;
    }
    S.filters = remapF(S.filters);
    S.dateFilters = remapF(S.dateFilters);
    S.numFilters  = remapF(S.numFilters);
    if (S.sort) { if (newIdx[S.sort.c] === -1) S.sort = null; else S.sort.c = newIdx[S.sort.c]; }
  }

  if (changed) {
    clearColSel();
    S.cellSel = null; S.active = null; S.rowSel.clear();
    buildGrid();
  }
  return changed;
}

async function saveFile(as) {
  if (!S.rows.length) return;
  if (editing) commitEdit();
  trimEmptyRowsAndCols();

  const btn = document.getElementById('bsv');
  btn.innerHTML = 'Saving…';
  btn.disabled = true;

  const csv = toCSV(S.rows);
  // Direct overwrite when path is known, absolute, and not an xlsx (which can't be saved as CSV in-place)
  const isAbsolute = S.path && /[/\\]/.test(S.path) && !/\.xlsx$/i.test(S.path);
  if (!as && isAbsolute) {
    try {
      const res = await fetch('/api/save?path=' + encodeURIComponent(S.path), {
        method: 'POST', headers: { 'Content-Type': 'text/plain; charset=utf-8' },
        body: csv,
      });
      if (res.ok) {
        const j = await res.json();
        if (j.ok) { S.dirty = false; setTitle(); flashSaved(); return; }
        restoreSaveBtn();
        alert('Save failed: ' + (j.error || 'unknown error'));
        return;
      }
      restoreSaveBtn();
      alert('Save failed (server error ' + res.status + ').');
      return;
    } catch (err) {
      restoreSaveBtn();
      alert('Save failed: ' + err.message);
      return;
    }
  }
  // No absolute path (drag-and-drop / file input) or Save As — open native Save dialog
  const suggested = (S.path || 'untitled.csv').replace(/.*[/\\]/, '').replace(/\.xlsx$/i, '.csv');
  try {
    const res = await fetch('/api/saveas?name=' + encodeURIComponent(suggested), {
      method: 'POST', headers: { 'Content-Type': 'text/plain; charset=utf-8' },
      body: csv,
    });
    if (res.ok) {
      const j = await res.json();
      if (j.ok) { S.path = j.path; S.dirty = false; setTitle(); flashSaved(); return; }
      if (j.cancelled) { restoreSaveBtn(); return; }
      restoreSaveBtn();
      alert('Save failed: ' + (j.error || 'unknown error'));
      return;
    }
    restoreSaveBtn();
    alert('Save failed (server error ' + res.status + ').');
  } catch (err) {
    restoreSaveBtn();
    alert('Save failed: ' + err.message);
  }
}

function restoreSaveBtn() {
  const btn = document.getElementById('bsv');
  btn.innerHTML = 'Save';
  syncSaveBtn();
}

function flashSaved() {
  const btn = document.getElementById('bsv');
  btn.classList.remove('pri');
  btn.innerHTML = '&#10003; Saved';
  btn.style.color = '#1a7a1a';
  setTimeout(function() { restoreSaveBtn(); btn.style.color = ''; }, 1500);
}

// ── Status bar ────────────────────────────────────────────────────────────────
function syncRowColCounts() {
  const total = Math.max(0, S.rows.length - 1), shown = vis.length;
  const nc = S.rows.length ? S.rows[0].length : 0;
  const fmt = n => n.toLocaleString('en-US');

  let selRows = null, selCols = null;
  if (colSel) {
    selCols = colSel.c2 - colSel.c1 + 1;
    selRows = shown;
  } else if (S.cellSel && (S.cellSel.r1 !== S.cellSel.r2 || S.cellSel.c1 !== S.cellSel.c2)) {
    const visSet = new Set(vis);
    let rc = 0;
    for (let r = S.cellSel.r1; r <= S.cellSel.r2; r++) if (visSet.has(r)) rc++;
    selRows = rc;
    selCols = S.cellSel.c2 - S.cellSel.c1 + 1;
  }

  if (selRows !== null) {
    document.getElementById('sr').textContent = fmt(selRows) + ' row' + (selRows !== 1 ? 's' : '');
    document.getElementById('sc').textContent = fmt(selCols) + ' col' + (selCols !== 1 ? 's' : '');
  } else {
    document.getElementById('sr').textContent = shown < total
      ? fmt(shown) + ' / ' + fmt(total) + ' rows (filtered)'
      : fmt(total) + ' row' + (total !== 1 ? 's' : '');
    document.getElementById('sc').textContent = nc ? fmt(nc) + ' col' + (nc !== 1 ? 's' : '') : '';
  }
}

function updateStatus() {
  syncRowColCounts();
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function colLetter(n) {
  let s = ''; do { s = String.fromCharCode(65 + n % 26) + s; n = Math.floor(n / 26) - 1; } while (n >= 0); return s;
}
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ea(s)  { return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
function fmtDate(v) {
  if (!v) return v;
  let m;
  // ISO datetime: 2024-05-30 00:00:00 or 2024-05-30T14:30:00
  m = v.match(/^(\d{4})-(\d{2})-(\d{2})[T ](\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (m) {
    const mo = +m[2], d = +m[3];
    if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) {
      const base = mo + '/' + d + '/' + m[1].slice(-2);
      const h = +m[4], min = +m[5], sec = +(m[6] || 0);
      if (h === 0 && min === 0 && sec === 0) return base;
      return base + ' ' + h + ':' + (min < 10 ? '0' : '') + min + (sec ? ':' + (sec < 10 ? '0' : '') + sec : '');
    }
  }
  // ISO date only: 2024-05-30
  m = v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) { const mo = +m[2], d = +m[3]; if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) return mo + '/' + d + '/' + m[1].slice(-2); }
  // US datetime: m/d/yy(yy) 0:00 or m/d/yy(yy) 14:30:00  (2- or 4-digit year)
  m = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})[T ](\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (m) {
    const mo = +m[1], d = +m[2];
    if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) {
      const yr = m[3].length <= 2 ? m[3] : m[3].slice(-2);
      const base = mo + '/' + d + '/' + yr;
      const h = +m[4], min = +m[5], sec = +(m[6] || 0);
      if (h === 0 && min === 0 && sec === 0) return base;
      return base + ' ' + h + ':' + (min < 10 ? '0' : '') + min + (sec ? ':' + (sec < 10 ? '0' : '') + sec : '');
    }
  }
  // US date only: m/d/yy(yy)
  m = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) { const mo = +m[1], d = +m[2]; if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) return mo + '/' + d + '/' + (m[3].length <= 2 ? m[3] : m[3].slice(-2)); }
  // ISO-slash date: 2024/05/30
  m = v.match(/^(\d{4})\/(\d{2})\/(\d{2})$/);
  if (m) { const mo = +m[2], d = +m[3]; if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) return mo + '/' + d + '/' + m[1].slice(-2); }
  return v;
}

// Parse a display/raw date string into a UTC ms timestamp, or return null.
// Mirrors the patterns in fmtDate so the same values are recognised.
function parseDateToMs(v) {
  if (!v) return null;
  let m, mo, d, yr;
  m = v.match(/^(\d{4})-(\d{2})-(\d{2})[T ](\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (m) { mo = +m[2]; d = +m[3]; if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) return new Date(+m[1], mo-1, d, +m[4], +m[5], +(m[6]||0)).getTime(); }
  m = v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) { mo = +m[2]; d = +m[3]; if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) return new Date(+m[1], mo-1, d).getTime(); }
  m = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})[T ](\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (m) { mo = +m[1]; d = +m[2]; if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) { yr = m[3].length <= 2 ? (+m[3] < 50 ? 2000+m[3]*1 : 1900+m[3]*1) : +m[3]; return new Date(yr, mo-1, d, +m[4], +m[5], +(m[6]||0)).getTime(); } }
  m = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) { mo = +m[1]; d = +m[2]; if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) { yr = m[3].length <= 2 ? (+m[3] < 50 ? 2000+m[3]*1 : 1900+m[3]*1) : +m[3]; return new Date(yr, mo-1, d).getTime(); } }
  m = v.match(/^(\d{4})\/(\d{2})\/(\d{2})$/);
  if (m) { mo = +m[2]; d = +m[3]; if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) return new Date(+m[1], mo-1, d).getTime(); }
  return null;
}

function fmtDateFromMs(ms) {
  const d = new Date(Math.round(ms));
  return (d.getMonth()+1) + '/' + d.getDate() + '/' + String(d.getFullYear()).slice(-2);
}

const HEX_COLOR_RE = /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/;

// Returns HTML for a cell — hex colours get a coloured dot; everything else is
// plain-text via esc(fmtCell()). Must NOT be passed through esc() by the caller.
function renderCell(v) {
  if (v && HEX_COLOR_RE.test(v.trim())) {
    const hex = v.trim();
    return '<span class="hex-dot" style="background-color:' + hex + '"></span>' + esc(hex.slice(1));
  }
  return esc(fmtCell(v));
}

// Returns true for plain integers/decimals and $-prefixed currency (no leading zeros).
// Strips thousand-separator commas first so "11,700" is recognised as numeric.
function isNumeric(v) {
  if (!v) return false;
  const t = v.trim().replace(/,/g, '');
  return /^-?(?:0|[1-9]\d*)(?:\.\d+)?$/.test(t) ||
         /^\$-?(?:0|[1-9]\d*)(?:\.\d+)?$/.test(t) ||
         /^-\$(?:0|[1-9]\d*)(?:\.\d+)?$/.test(t) ||
         /^-?(?:0|[1-9]\d*)(?:\.\d+)?%$/.test(t);
}

// Display formatter: adds comma thousands separators; falls back to fmtDate for non-numbers.
// Strips existing thousand-separator commas first so "11,700" round-trips correctly.
function fmtCell(v) {
  if (!v) return v;
  const t = v.trim();
  const s = t.replace(/,/g, ''); // strip existing commas before detection/formatting
  // Negative currency with leading minus: -$1234.56
  if (/^-\$(?:0|[1-9]\d*)(?:\.\d+)?$/.test(s)) {
    const raw = s.slice(2);
    const n = +raw;
    if (!isNaN(n) && isFinite(n)) {
      const dec = raw.includes('.') ? raw.length - raw.indexOf('.') - 1 : 2;
      const parts = n.toFixed(Math.max(2, dec)).split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return '-$' + parts.join('.');
    }
  }
  // Currency: $1234 or $-1234.56 (with or without commas)
  if (/^\$(-?)(?:0|[1-9]\d*)(?:\.\d+)?$/.test(s)) {
    const neg = s[1] === '-';
    const raw = s.replace('$', '').replace('-', '');
    const n = +raw;
    if (!isNaN(n) && isFinite(n)) {
      const dec = raw.includes('.') ? raw.length - raw.indexOf('.') - 1 : 2;
      const parts = n.toFixed(Math.max(2, dec)).split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return '$' + (neg ? '-' : '') + parts.join('.');
    }
  }
  // Plain number (integer or decimal, optional leading minus)
  if (/^-?(?:0|[1-9]\d*)(?:\.\d+)?$/.test(s)) {
    const neg = s[0] === '-';
    const abs = neg ? s.slice(1) : s;
    const n = +abs;
    if (isNaN(n) || !isFinite(n)) return fmtDate(v);
    const dec = abs.includes('.') ? abs.length - abs.indexOf('.') - 1 : 0;
    const parts = n.toFixed(dec).split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return (neg ? '-' : '') + parts.join('.');
  }
  return fmtDate(v);
}

// ── Inspect Panel ─────────────────────────────────────────────────────────────
function colPreview(col) {
  const rows = S.rows;
  if (!rows || rows.length < 2) return '';
  const seen = [], seenSet = new Set();
  const scanLimit = Math.min(rows.length, 501);
  for (let r = 1; r < scanLimit && seen.length < 3; r++) {
    const v = (rows[r][col] || '').trim();
    if (v && !seenSet.has(v)) { seenSet.add(v); seen.push(fmtCell(v)); }
  }
  return seen.length ? seen.join(', ') + (seen.length >= 3 ? '…' : '') : '';
}
