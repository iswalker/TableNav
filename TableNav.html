<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#f3f4f6">
<link rel="manifest" href="/manifest.json">
<title>TableNav</title>
<style>
:root {
  --rnw: 42px;
  --bg-hdr: #f0f0f0;
  --border: #d0d0d0;
  --accent: #0078d4;
  --green: #107c10;
  --sel-bg: rgba(0, 100, 212, 0.14);
  --sel-border: #0078d4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  font-size: 12px;
  color: #1a1a1a;
  background: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── Toolbar ── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 4px 8px;
  background: #f3f4f6;
  border-bottom: 1px solid #d0d0d0;
  flex-shrink: 0;
  min-height: 32px;
}
.btn {
  padding: 4px 12px;
  border: 1px solid #d0d0d0;
  background: #ffffff;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  line-height: 1.4;
  white-space: nowrap;
  color: #333;
}
.btn:hover { background: #f0f0f0; border-color: #aaa; }
.btn.pri { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.pri:hover { background: #005fa3; border-color: #005fa3; }
.btn:disabled { opacity: .45; cursor: default; }
.sep { width: 1px; height: 20px; background: #d0d0d0; margin: 0 3px; }
#fp {
  flex: 1;
  font-size: 11px;
  color: #666;
  font-style: italic;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-left: 6px;
}

/* ── Grid wrap ── */
#gw {
  flex: 1;
  overflow: auto;
  position: relative;
  background: #fff;
}
#empty {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: #fff;
  z-index: 50;
  color: #888;
}
#empty h2 { font-size: 18px; font-weight: 600; color: #555; }
#empty.h { display: none; }

/* ── Table ── */
#gt {
  border-collapse: collapse;
  table-layout: fixed;
}

/* ── Header row (single sticky row, top:0) ── */
thead th {
  background: #f5f5f5;
  border: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 3px 4px 3px 5px;
  position: sticky;
  top: -1px;
  z-index: 9;
  overflow: hidden;
  font-weight: 400;
  vertical-align: middle;
  text-align: left;
}
/* Corner cell */
th.cx {
  position: sticky !important;
  left: 0;
  top: 0;
  z-index: 10 !important;
  background: var(--bg-hdr) !important;
}
/* Header cell content */
.hi { display: flex; align-items: flex-start; gap: 2px; }
.hn {
  flex: 1;
  min-width: 0;
  word-break: normal;
  overflow-wrap: anywhere;
  white-space: normal;
  line-height: 1.3;
  font-size: 12px;
  color: #222;
  cursor: grab;
}
.fb {
  position: absolute;
  bottom: 3px;
  right: 7px;
  background: #fff;
  border: 1px solid #d0d0d0;
  border-radius: 2px;
  padding: 1px 1px;
  font-size: 9px;
  color: #888;
  cursor: pointer;
  line-height: 1;
  z-index: 3;
  visibility: hidden;
}
.fb.on { visibility: visible; }
.fb:hover { color: var(--accent); border-color: var(--accent); }
.fb.on { background: var(--accent); color: #fff; border-color: var(--accent); }
th.large-text-hdr { cursor: default; }

/* Phantom "+" column header */
th.ph-hdr {
  background: var(--bg-hdr);
  text-align: center;
  color: #999;
  font-size: 16px;
  cursor: pointer;
  padding: 0;
  width: 38px;
  min-width: 38px;
}
th.ph-hdr:hover { background: #d4e6f1; color: var(--accent); }

/* ── Row-number cells ── */
td.rn {
  background: var(--bg-hdr);
  border: 1px solid var(--border);
  text-align: center;
  color: #666;
  font-size: 12px;
  padding: 1px 4px;
  width: var(--rnw);
  min-width: var(--rnw);
  position: sticky;
  left: 0;
  z-index: 5;
  cursor: grab;
  user-select: none;
  vertical-align: middle;
  will-change: transform;
}
td.rn:hover { background: #d4e6f1; }
tr.rs td.rn { background: #c8d8f4; }

/* ── Data cells ── */
td.dc {
  border: 1px solid var(--border);
  padding: 1px 4px;
  cursor: cell;
  vertical-align: middle;
}
td.dc:hover:not(.ac):not(.sel) { background: #f0f7ff; }
tr.rs td.dc { background: var(--sel-bg) !important; }

/* Numeric cell — right-aligned */
td.dc.nr { text-align: right; }

/* Date cell — right-aligned */
td.dc.dt { text-align: right; }

/* Hex colour swatch dot */
.hex-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.18);
  margin-right: 5px;
  vertical-align: middle;
  position: relative;
  top: -2px;
  flex-shrink: 0;
}

/* ── Tab bar ── */
#tabbar { display:flex; align-items:flex-end; gap:2px; margin-left:auto;
          overflow-x:auto; overflow-y:hidden; max-width:55%; flex-shrink:0;
          align-self:flex-end; position:relative; z-index:1; margin-bottom:-5px; }
#tabbar::-webkit-scrollbar { height:3px; }
#tabbar::-webkit-scrollbar-thumb { background:#bbb; border-radius:2px; }
.tab { display:flex; align-items:center; gap:4px; padding:2px 6px 2px 8px;
       height:24px; border:1px solid #d0d0d0; border-bottom:none;
       border-radius:4px 4px 0 0; background:#e8e8e8; cursor:pointer;
       font-size:12px; white-space:nowrap; max-width:160px; color:#555;
       user-select:none; }
.tab:hover:not(.tab-active) { background:#dde8f4; }
.tab.tab-active { background:#fff; border-color:#0078d4; color:#111; font-weight:500; }
.tab-lbl { flex:1; overflow:hidden; text-overflow:ellipsis; min-width:0; }
.tab-close { border:none; background:transparent; cursor:pointer; font-size:10px;
             color:#888; padding:0 2px; line-height:1; flex-shrink:0; border-radius:2px; }
.tab-close:hover { background:#e0c0c0; color:#c00; }
.tab-new { padding:1px 7px !important; font-size:13px !important; height:22px;
           align-self:center; flex-shrink:0; margin-left:2px; }

/* Inner content div — text overflow */
.cv {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.4;
}

/* Active cell */
td.ac {
  outline: 2px solid var(--sel-border) !important;
  outline-offset: -2px;
  background: #fff !important;
  overflow: visible;
  position: relative;
  z-index: 10;
}

/* Value-color highlighting (toggled via body.vc) */
body.vc td.dc.cv-yes { background: #d7f6db; }
body.vc td.dc.cv-no  { background: #fbe3d6; }
body.vc td.dc.cv-tbd { color: #555; }

/* Rectangle selection */
td.sel {
  background: var(--sel-bg) !important;
}
td.sel.ac {
  outline-color: var(--sel-border) !important;
}

/* Fixed row height — must match ROW_H constant in JS */
#gt tbody tr:not(.ph-row) { height: 24px; }

/* Phantom (expand) row */
tr.ph-row td.rn {
  font-size: 15px;
  color: #bbb;
  cursor: pointer;
}
tr.ph-row td.rn:hover { color: var(--accent); background: #d4e6f1; }
tr.ph-row td.dc {
  cursor: cell;
  background: #fdfdfd !important;
}
tr.ph-row td.dc:hover { background: #f0f7ff !important; }

/* Phantom column data cells */
td.ph-dc {
  background: #f8f8f8 !important;
  border: 1px solid var(--border);
  cursor: default;
}

/* Inline editor */
.ce {
  position: absolute;
  inset: 0;
  border: none;
  outline: none;
  padding: 1px 4px;
  font: inherit;
  background: #fff;
  z-index: 3;
  min-width: 100%;
  box-shadow: inset 0 0 0 2px var(--sel-border), 0 2px 8px rgba(0,0,0,.18);
}

/* Column resizer */
.rz {
  position: absolute;
  right: 0;
  top: 0;
  width: 5px;
  height: 100%;
  cursor: col-resize;
  z-index: 2;
}
.rz:hover, .rz.on { background: var(--accent); opacity: .6; }

/* Column selection */
th.col-sel { background: #c8d8f4 !important; }

/* Right-click context menu */
.ctxmenu {
  position: fixed;
  background: #fff;
  border: 1px solid #bbb;
  border-radius: 3px;
  box-shadow: 0 4px 14px rgba(0,0,0,.18);
  z-index: 9999;
  min-width: 150px;
  font-size: 12px;
  padding: 3px 0;
}
.ctxitem { padding: 5px 14px; cursor: pointer; color: #222; }
.ctxitem:hover { background: #f0f7ff; color: var(--accent); }
.ctxitem.danger:hover { background: #fff0f0; color: #c00; }
#col-drag-line { position: fixed; top: 0; width: 2px; background: #2d7ff9; z-index: 9998; pointer-events: none; display: none; }
#row-drag-line { position: fixed; left: 0; height: 2px; background: #2d7ff9; z-index: 9998; pointer-events: none; display: none; }
body.is-dragging, body.is-dragging * { cursor: grabbing !important; }

/* Filter popup */
.fpop {
  position: fixed;
  background: #fff;
  border: 1px solid #bbb;
  border-radius: 3px;
  box-shadow: 0 4px 14px rgba(0,0,0,.18);
  z-index: 9999;
  min-width: 200px;
  max-height: 320px;
  display: flex;
  flex-direction: column;
  font-size: 12px;
}
.fsrch {
  border: none;
  border-bottom: 1px solid #ddd;
  padding: 5px 8px;
  outline: none;
  font: inherit;
  flex-shrink: 0;
}
.flist { overflow-y: auto; flex: 1; padding: 2px 0; }
.fitem { display: flex; align-items: center; gap: 6px; padding: 3px 8px; cursor: pointer; }
.fitem:hover { background: #f0f7ff; }
.fitem input[type=checkbox] { margin: 0; flex-shrink: 0; }
.fitem label { flex: 1; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ffoot { display: flex; gap: 4px; padding: 4px 6px; border-top: 1px solid #ddd; flex-shrink: 0; }
.fload { padding: 5px 8px; border-top: 1px solid #ddd; flex-shrink: 0; }
.fload button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; padding: 0; text-decoration: underline; }
.fload button:hover { color: #005fa3; }
.ffoot button {
  flex: 1; padding: 3px; font-size: 11px; cursor: pointer;
  border: 1px solid #aaa; border-radius: 2px; background: #f5f5f5;
}
.ffoot button:hover { background: #ddeeff; }
/* Date filter — "In the last X days" bar */
.fdt-last { display:flex; align-items:center; gap:5px; padding:5px 8px; border-bottom:1px solid #ddd; flex-shrink:0; font-size:12px; }
.fdt-last input[type=number] { width:50px; padding:2px 4px; border:1px solid #ccc; border-radius:2px; font:inherit; text-align:center; -moz-appearance:textfield; }
.fdt-last input[type=number]::-webkit-inner-spin-button,
.fdt-last input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
/* Date filter — year/month tree rows */
.ftnode-row { display:flex; align-items:center; gap:4px; padding:2px 8px; cursor:default; user-select:none; }
.ftnode-row:hover { background:#f0f7ff; }
.ftnode-toggle { width:14px; text-align:center; font-size:9px; flex-shrink:0; cursor:pointer; color:#555; }
.ftnode-cb { margin:0; flex-shrink:0; cursor:pointer; }
.ftnode-lbl { flex:1; cursor:pointer; }
.ftnode-children { padding-left:16px; }
.ftnode-children.collapsed { display:none; }
.ftnode-children .fitem { padding-left:22px; }

/* ── Status bar ── */
#sb {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 2px 8px;
  background: #e9ecef;
  border-top: 1px solid #bbb;
  font-size: 12px;
  color: #555;
  flex-shrink: 0;
  min-height: 20px;
}
#sstat { margin-left: auto; color: #444; }

/* Selection corner handle */
#sel-handle {
  display: none;
  position: fixed;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 1px;
  pointer-events: none;
  z-index: 8;
}

/* Loading overlay */
#loading-overlay {
  position: absolute;
  inset: 0;
  z-index: 55;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  pointer-events: none;
}
#loading-overlay.h { display: none; }
#loading-popup {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  background: #fff;
  border: 1px solid #d0d0d0;
  border-radius: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,.14);
  padding: 20px 32px;
  pointer-events: auto;
  color: #666;
  font-size: 13px;
}
.spinner {
  width: 24px;
  height: 24px;
  border: 3px solid #e0e0e0;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Drop overlay */
#dov {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,120,212,.1);
  border: 3px dashed var(--accent);
  z-index: 99999;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  pointer-events: none;
}

/* ── Inspect Panel ───────────────────────────────────────────────────────── */
#inspect-panel {
  position: absolute; inset: 0; display: flex; background: #fff; z-index: 20;
  font-size: 12px;
}
#inspect-panel.h { display: none; }
#ip-left {
  width: 37.5%; min-width: 220px; max-width: 420px; border-right: 1px solid #d0d0d0;
  display: flex; flex-direction: column; overflow: hidden;
}
#ip-right {
  flex: 1; overflow: auto; padding: 10px 14px;
}
.ip-sec { display: flex; flex-direction: column; min-height: 0; }
.ip-sec-hdr {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 8px; background: #f3f3f3; border-bottom: 1px solid #e0e0e0;
  font-weight: 600; font-size: 12px; color: #1a1a1a; user-select: none;
  flex-shrink: 0; cursor: default;
}
.ip-sec-hdr .ip-sec-toggle { cursor: pointer; font-size: 10px; color: #888; margin-right: 2px; }
.ip-sec-hdr .ip-sec-title { flex: 1; }
.ip-sec-body {
  overflow-y: auto; padding: 6px 6px 4px 6px; flex-shrink: 0;
}
#ip-sec-fields .ip-sec-body { flex: 1; min-height: 60px; }
#ip-sec-fav    .ip-sec-body { min-height: 40px; max-height: 100px; }
#ip-sec-sumby  .ip-sec-body { min-height: 40px; max-height: 120px; }
.ip-search {
  width: 100%; box-sizing: border-box; padding: 4px 6px; font-size: 12px;
  border: 1px solid #d0d0d0; border-radius: 3px; margin-bottom: 5px;
  outline: none;
}
.ip-search:focus { border-color: var(--accent); }
.ip-pill {
  display: flex; align-items: center; gap: 3px; padding: 3px 5px 4px 5px;
  border-radius: 3px; background: #e8f0fe; border: 1px solid #b8d0f8;
  font-size: 12px; color: #222; cursor: pointer; user-select: none;
  margin-bottom: 5px; overflow: hidden;
  position: relative;
}
.ip-pill:hover { background: #d0e4ff; }
.ip-pill.ip-pill-dragging { opacity: 0.4; }
.ip-pill-lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.ip-pill-fb { font-size: 9px; color: #888; cursor: pointer; flex-shrink: 0;
              padding: 1px 2px 1px 2px; border-radius: 2px; border: 1px solid #d0d0d0; line-height: 1; }
.ip-pill-fb.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.ip-pill-fb:hover { background: #dde8f4; color: var(--accent); border-color: var(--accent); }
.ip-pill-fb.on:hover { background: #005fa3; border-color: #005fa3; }
.ip-pill-rm { font-size: 10px; color: #999; cursor: pointer; flex-shrink: 0;
              padding: 0 2px; line-height: 1; border-radius: 2px; }
.ip-pill-rm:hover { color: #c00; background: #fde8e8; }
.ip-dropzone {
  min-height: 25px; border-radius: 4px;
  padding: 3px 5px; color: #aaa; font-size: 12px; transition: border-color .15s;
}
.ip-dropzone.dz-over { border-color: var(--accent); background: #f0f6ff; color: var(--accent); }
.ip-field-row {
  padding: 3px 5px 4px 5px; border-radius: 3px; border: 1px solid #d0d0d0;
  cursor: grab; user-select: none; font-size: 12px; color: #333;
  display: flex; align-items: center; gap: 3px; margin-bottom: 5px;
}
.ip-field-row:hover { background: #eaf2ff; }
.ip-field-row.ip-in-use { color: #aaa; cursor: pointer; background: #f3f3f3; }
.ip-field-row.ip-in-use:hover { background: #e0e8ff; }
.ip-field-lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.ip-field-vals { color: #aaa; font-style: italic; margin-left: 8px; }
.ip-field-fb { font-size: 9px; color: #bbb; cursor: pointer; flex-shrink: 0;
               padding: 1px 2px 1px 2px; border-radius: 2px; line-height: 1;
               border: 1px solid #d0d0d0; }
.ip-field-fb.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.ip-field-fb:hover { background: #dde8f4; color: var(--accent); border-color: var(--accent); }
.ip-field-fb.on:hover { background: #005fa3; border-color: #005fa3; color: #fff; }
#ip-toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.ip-toggle-wrap { display: flex; align-items: center; gap: 6px; }
.ip-toggle-lbl { font-size: 11px; color: #666; white-space: nowrap; }
.ip-date-group { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.ip-date-group button { border: none; border-right: 1px solid var(--border); background: #f5f5f5; padding: 4px 12px; font-size: 12px; cursor: pointer; color: #444; line-height: 1.4; transition: background 0.1s; }
.ip-date-group button:last-child { border-right: none; }
.ip-date-group button.idg-on { background: var(--accent); color: #fff; }
.ip-date-group button:hover:not(.idg-on) { background: #e2e2e2; }
.ip-tbl { border-collapse: collapse; font-size: 12px; }
.ip-tbl td, .ip-tbl th {
  padding: 3px 8px; border: none; border-top: 1px solid var(--border);
  text-align: left; vertical-align: top;
}
.ip-tbl thead th {
  background: #f5f5f5; font-weight: 600; border-top: none; border-bottom: 2px solid #aaa;
  vertical-align: middle;
}
.ip-tbl .ip-row-primary td { font-weight: 600; color: #111; background: #fff; }
.ip-tbl .ip-row-primary td:hover { background: #f0f7ff; }
.ip-tbl .ip-row-secondary td { color: #333; background: #fff; cursor: pointer; border-top: none; }
.ip-tbl .ip-row-secondary td:hover { background: #f0f7ff; }
.ip-tbl .ip-row-total td { font-weight: 600; color: #111; background: #f5f5f5; border-top: 2px solid #aaa; }
.ip-tbl .ip-col-toggle { width: 18px; text-align: center; color: #888; font-size: 10px; }
.ip-tbl .ip-col-count { text-align: right; min-width: 50px; }
.ip-tbl .ip-col-pct { text-align: right; min-width: 60px; }
.ip-tbl td.ip-col-pct { color: #888; }
.ip-pill.dz-above { margin-top: 14px; }
.ip-pill.dz-above::before {
  content: ''; position: absolute; left: 0; right: 0; top: -8px;
  height: 2px; background: var(--accent); border-radius: 1px;
}
.ip-pill.dz-below { margin-bottom: 14px; }
.ip-pill.dz-below::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -8px;
  height: 2px; background: var(--accent); border-radius: 1px;
}
.ip-empty { color: #aaa; font-size: 12px; padding: 8px 4px; text-align: center; }
#binsp.pri { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
<style id="colsel-style"></style>
</head>
<body>

<div id="toolbar">
  <button class="btn" id="bsv" onclick="saveFile(false)" disabled>Save</button>
  <button class="btn" id="bsa" onclick="saveFile(true)" disabled>Save As&hellip;</button>
  <div class="sep"></div>
  <button class="btn" id="bcf" onclick="clearAllFilters()" disabled>&#10005; Clear Filters</button>
  <button class="btn" id="binsp" onclick="toggleInspect()" disabled>&#9635; Inspect</button>
  <button class="btn" id="bvc" onclick="toggleValueColors()" disabled>Toggle Colors Off</button>
  <span id="fp" style="display:none">No file loaded</span>
  <div id="tabbar"></div>
</div>

<div id="col-drag-line"></div>
<div id="row-drag-line"></div>
<div id="gw">
  <div id="empty">
    <h2>TableNav</h2>
    <p>Drag &amp; drop a CSV or XLSX file here, or double-click to open</p>
    <p style="font-size:11px;color:#aaa">or click <strong>+</strong> in the toolbar to create a new file</p>
  </div>
  <div id="loading-overlay"><div id="loading-popup"><div class="spinner"></div><span>Loading&hellip;</span></div></div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  rows: [],       // string[][] — [0]=headers, [1..]=data
  path: null,
  widths: [],     // px per data column
  filters: {},     // { colIdx: Set<string> }
  dateFilters: {}, // { colIdx: {days:N} }
  numFilters:  {}, // { colIdx: {gt:N} }
  sort: null,      // { c, dir } | null
  rowSel: new Set(), // row indices selected via row-number click
  cellSel: null,  // { r1,c1,r2,c2 } rectangle selection | null
  active: null,   // { r, c } anchor cell | null
  dirty: false,
};
// ── Tab state ─────────────────────────────────────────────────────────────────
let tabs = [];
let activeTabIdx = 0;

function makeTab(o) {
  return Object.assign({
    rows: null, path: null, name: null, widths: [], filters: {}, dateFilters: {}, numFilters: {}, sort: null,
    dirty: false, cellSel: null, active: null, rowSel: [],
    scrollTop: 0, scrollLeft: 0,
    undoState: null, redoState: null, prevSelState: null
  }, o || {});
}

function saveTabState() {
  const t = tabs[activeTabIdx];
  if (!t) return;
  t.rows = S.rows;
  t.path = S.path;
  t.widths = S.widths.slice();
  t.filters = S.filters;
  t.dateFilters = S.dateFilters;
  t.numFilters = S.numFilters;
  t.searchFilters = S.searchFilters;
  t.sort = S.sort ? { c: S.sort.c, dir: S.sort.dir } : null;
  t.dirty = S.dirty;
  t.cellSel = S.cellSel ? Object.assign({}, S.cellSel) : null;
  t.active = S.active ? Object.assign({}, S.active) : null;
  t.rowSel = Array.from(S.rowSel);
  const gw = document.getElementById('gw');
  t.scrollTop  = gw ? gw.scrollTop  : 0;
  t.scrollLeft = gw ? gw.scrollLeft : 0;
  t.undoState = undoState;
  t.redoState = redoState;
  t.prevSelState = prevSelState;
}

function restoreTabState(idx) {
  const t = tabs[idx];
  if (!t) return;
  S.rows    = t.rows || [['Column 1', 'Column 2'], ['', '']];
  S.path    = t.path;
  S.widths  = t.widths.slice();
  S.filters = t.filters || {};
  S.dateFilters = t.dateFilters || {};
  S.numFilters = t.numFilters || {};
  S.searchFilters = t.searchFilters || {};
  S.sort    = t.sort ? Object.assign({}, t.sort) : null;
  S.dirty   = t.dirty;
  S.cellSel = null;
  S.active  = null;
  S.rowSel  = new Set(t.rowSel || []);
  undoState    = t.undoState;
  redoState    = t.redoState;
  prevSelState = t.prevSelState;
  loadingSession++;  // cancel any in-progress background parse for previous tab
  buildGrid();
  setTitle();
  const gw = document.getElementById('gw');
  if (gw) { gw.scrollTop = t.scrollTop || 0; gw.scrollLeft = t.scrollLeft || 0; }
}

function switchTab(idx) {
  if (idx === activeTabIdx) return;
  if (editing) commitEdit();
  closePopup();
  saveTabState();
  activeTabIdx = idx;
  restoreTabState(idx);
  renderTabBar();
}

// Loads all sheets from an application/x-xlsx-sheets JSON response into separate tabs.
// The caller must have already set activeTabIdx to the tab that should receive the first sheet.
async function loadXlsxSheets(resp, xlsxPath) {
  const sheets = await resp.json();
  if (!sheets.length) { alert('xlsx file appears to be empty.'); return; }
  const firstTabIdx = activeTabIdx;
  load(sheets[0].csv, xlsxPath);
  if (tabs[firstTabIdx]) tabs[firstTabIdx].name = sheets[0].name;
  for (let i = 1; i < sheets.length; i++) {
    saveTabState();
    tabs.push(makeTab({ path: xlsxPath, name: sheets[i].name }));
    activeTabIdx = tabs.length - 1;
    load(sheets[i].csv, xlsxPath);
  }
  renderTabBar();
  if (sheets.length > 1) {
    activeTabIdx = firstTabIdx;
    restoreTabState(firstTabIdx);
    renderTabBar();
  }
}

async function openTab(path) {
  if (editing) commitEdit();
  closePopup();
  saveTabState();
  tabs.push(makeTab({ path: path }));
  activeTabIdx = tabs.length - 1;
  loadingSession++;
  renderTabBar();
  try {
    const resp = await fetch('/api/load?path=' + encodeURIComponent(path));
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    if ((resp.headers.get('Content-Type') || '').includes('x-xlsx-sheets')) {
      await loadXlsxSheets(resp, path);
    } else {
      load(await resp.text(), path);
    }
  } catch (err) {
    alert('Could not open file: ' + err.message);
  }
}

function closeTab(idx) {
  const t = tabs[idx];
  if (!t) return;
  tabs.splice(idx, 1);
  if (tabs.length === 0) {
    activeTabIdx = 0;
    showLanding();
    return;
  }
  if (activeTabIdx >= tabs.length) activeTabIdx = tabs.length - 1;
  else if (activeTabIdx > idx)    activeTabIdx--;
  restoreTabState(activeTabIdx);
  renderTabBar();
}

function closeTabWithConfirm(idx) {
  const t = tabs[idx];
  if (!t) return;
  if (!t.dirty) { closeTab(idx); return; }
  const name = (t.path || 'Untitled').replace(/.*[/\\]/, '');

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,0.32);display:flex;align-items:center;justify-content:center;z-index:9999';

  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:8px;padding:22px 24px 18px;box-shadow:0 8px 32px rgba(0,0,0,0.22);min-width:270px;max-width:360px;font-family:inherit';
  box.innerHTML =
    '<div style="font-size:14px;font-weight:600;color:#111;margin-bottom:8px">Unsaved Changes</div>'
    + '<div style="font-size:12px;color:#555;margin-bottom:20px">Save changes to <strong>' + esc(name) + '</strong> before closing?</div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end">'
    + '<button class="btn" data-act="cancel">Cancel</button>'
    + '<button class="btn" data-act="nosave">Close</button>'
    + '<button class="btn pri" data-act="save">Save &amp; Close</button>'
    + '</div>';
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  function dismiss() { document.body.removeChild(overlay); }

  overlay.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { e.preventDefault(); dismiss(); }
  });
  overlay.addEventListener('mousedown', function(e) {
    if (e.target === overlay) dismiss();
  });

  box.querySelector('[data-act="cancel"]').onclick = dismiss;

  box.querySelector('[data-act="nosave"]').onclick = function() {
    dismiss();
    closeTab(idx);
  };

  box.querySelector('[data-act="save"]').onclick = async function() {
    dismiss();
    if (idx !== activeTabIdx) switchTab(idx);
    await saveFile(false);
    if (!S.dirty) closeTab(idx);
  };

  box.querySelector('[data-act="save"]').focus();
}

function requestAppQuit() {
  const hasDirty = tabs.some(function(t) { return t.dirty; });
  if (!hasDirty) {
    fetch('/api/shutdown', { method: 'POST' }).catch(function(){});
    return;
  }
  const dirtyCount = tabs.filter(function(t) { return t.dirty; }).length;
  const msg = dirtyCount === 1
    ? 'You have 1 tab with unsaved changes.'
    : 'You have ' + dirtyCount + ' tabs with unsaved changes.';

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,0.32);display:flex;align-items:center;justify-content:center;z-index:9999';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:8px;padding:22px 24px 18px;box-shadow:0 8px 32px rgba(0,0,0,0.22);min-width:270px;max-width:360px;font-family:inherit';
  box.innerHTML =
    '<div style="font-size:14px;font-weight:600;color:#111;margin-bottom:8px">Unsaved Changes</div>'
    + '<div style="font-size:12px;color:#555;margin-bottom:20px">' + esc(msg) + '</div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end">'
    + '<button class="btn" data-act="cancel">Cancel</button>'
    + '<button class="btn" data-act="closeall">Close All</button>'
    + '<button class="btn pri" data-act="saveall">Save &amp; Close All</button>'
    + '</div>';
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  function dismiss() { document.body.removeChild(overlay); }
  overlay.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { e.preventDefault(); dismiss(); }
  });
  overlay.addEventListener('mousedown', function(e) {
    if (e.target === overlay) dismiss();
  });
  box.querySelector('[data-act="cancel"]').onclick = dismiss;
  box.querySelector('[data-act="closeall"]').onclick = function() {
    dismiss();
    fetch('/api/shutdown', { method: 'POST' }).catch(function(){});
  };
  box.querySelector('[data-act="saveall"]').onclick = async function() {
    dismiss();
    for (let i = 0; i < tabs.length; i++) {
      if (!tabs[i].dirty) continue;
      if (i !== activeTabIdx) switchTab(i);
      await saveFile(false);
      if (S.dirty) return; // user cancelled a Save As dialog — abort quit
    }
    fetch('/api/shutdown', { method: 'POST' }).catch(function(){});
  };
  box.querySelector('[data-act="saveall"]').focus();
}

function restartApp() {
  if (editing) commitEdit();
  saveTabState();
  if (tabs.some(function(t) { return t.dirty; })) {
    showRestartDialog();
  } else {
    doRestart();
  }
}

function showRestartDialog() {
  const dirtyCount = tabs.filter(function(t) { return t.dirty; }).length;
  const msg = dirtyCount === 1
    ? 'You have 1 tab with unsaved changes.'
    : 'You have ' + dirtyCount + ' tabs with unsaved changes.';
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,0.32);display:flex;align-items:center;justify-content:center;z-index:9999';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:8px;padding:22px 24px 18px;box-shadow:0 8px 32px rgba(0,0,0,0.22);min-width:270px;max-width:360px;font-family:inherit';
  box.innerHTML =
    '<div style="font-size:14px;font-weight:600;color:#111;margin-bottom:8px">Restart TableNav</div>'
    + '<div style="font-size:12px;color:#555;margin-bottom:20px">' + esc(msg) + '</div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end">'
    + '<button class="btn" data-act="cancel">Cancel</button>'
    + '<button class="btn" data-act="restart">Restart Anyway</button>'
    + '<button class="btn pri" data-act="saveall">Save &amp; Restart</button>'
    + '</div>';
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  function dismiss() { document.body.removeChild(overlay); }
  overlay.addEventListener('mousedown', function(e) { if (e.target === overlay) dismiss(); });
  overlay.addEventListener('keydown', function(e) { if (e.key === 'Escape') { e.preventDefault(); dismiss(); } });
  box.querySelector('[data-act="cancel"]').onclick = dismiss;
  box.querySelector('[data-act="restart"]').onclick = function() { dismiss(); doRestart(); };
  box.querySelector('[data-act="saveall"]').onclick = async function() {
    dismiss();
    for (let i = 0; i < tabs.length; i++) {
      if (!tabs[i].dirty) continue;
      if (i !== activeTabIdx) switchTab(i);
      await saveFile(false);
      if (S.dirty) return; // user cancelled a Save As dialog — abort
    }
    doRestart();
  };
  box.querySelector('[data-act="saveall"]').focus();
}

function doRestart() {
  saveTabState();
  const activePath = tabs[activeTabIdx] ? tabs[activeTabIdx].path : null;
  const otherPaths = tabs
    .filter(function(t, i) { return i !== activeTabIdx && t.path; })
    .map(function(t) { return t.path; });
  const paths = (activePath ? [activePath] : []).concat(otherPaths);
  fetch('/api/restart', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(paths)
  }).catch(function() {});
}

function showLanding() {
  if (inspectOpen) toggleInspect();
  document.getElementById('empty').classList.remove('h');
  document.getElementById('gt').style.display = 'none';
  const lo = document.getElementById('loading-overlay');
  if (lo) lo.classList.add('h');
  const sh = document.getElementById('sel-handle');
  if (sh) sh.style.display = 'none';
  setEnabled(false);
  renderTabBar();
}

function newBlankTab() {
  if (editing) commitEdit();
  closePopup();
  saveTabState();
  tabs.push(makeTab());
  activeTabIdx = tabs.length - 1;
  initGrid([['Column 1', 'Column 2'], ['', '']], null);
  renderTabBar();
}

function renderTabBar() {
  const bar = document.getElementById('tabbar');
  if (!bar) return;
  let h = '';
  for (let i = 0; i < tabs.length; i++) {
    const t = tabs[i];
    const name = t.name || (t.path || 'Untitled').replace(/.*[/\\]/, '');
    const label = (t.dirty ? '* ' : '') + name;
    const cls = 'tab' + (i === activeTabIdx ? ' tab-active' : '');
    const tooltip = t.name && t.path ? t.path + ' — ' + t.name : (t.path || 'Untitled');
    h += '<div class="' + cls + '" onclick="switchTab(' + i + ')"'
       + ' title="' + esc(tooltip) + '">'
       + '<span class="tab-lbl">' + esc(label) + '</span>'
       + '<button class="tab-close" onclick="event.stopPropagation();closeTabWithConfirm(' + i + ')" title="Close">&#10005;</button>'
       + '</div>';
  }
  h += '<button class="btn tab-new" onclick="newBlankTab()" title="New tab">+</button>';
  bar.innerHTML = h;
}

window.openTabFromServer = openTab;

let vis = [];           // filtered+sorted row indices into S.rows
let popup = null;
let filterOpenTimer = null;
let filterCloseTimer = null;
let filterComputeToken = 0;
let largeTextCols = new Set(); // cols with >1000 distinct text values
let filterValCache = {};       // 'tabIdx:col' → sorted distinct-value array (large-text cols only)
let filterCountCache = {};     // 'tabIdx:col' → distinct value count (fast, no sort)
let popupSavedState = null;    // filter state snapshot taken when a popup opens (for Esc restore)
let editing = null;     // { r, c, td, old }
let dragOrigin = null;  // { r, c } where mouse-drag started
let dragRaf = null;
let dragX = 0, dragY = 0;
let dragScrollRaf = null;
let dragScrollLastTime = 0;
let rnDragStart = null, rnDragRaf = null;
let rnSelAnchor = null;   // anchor row-index for shift-arrow row-sel extension
let colSelAnchor = null;  // anchor col-index for shift-arrow col-sel extension
let hdrDragX0 = 0, hdrDragY0 = 0; // mousedown position for drag threshold
let hdrIsDragging = false;  // true once drag threshold exceeded on header
let hdrDropGap = null;      // 0..nc gap index for column drop target
let rnDragY0 = 0;           // mousedown Y for drag threshold
let rnIsDragging = false;   // true once drag threshold exceeded on row number
let rnDropIdx = undefined;  // raw row index before which to insert (null=end, undefined=not yet set)
let prevSelState = null; // for efficient DOM diff during drag
let valueColorsOn = true; // whether Yes/No/TBD cell coloring is active
let undoState = null;   // { rows, widths } snapshot before last mutation
let redoState = null;   // { rows, widths } snapshot available for redo
let loadingSession = 0; // incremented on each load; background parse uses this to abort if a new file opens

// ── Virtual scroll state ──────────────────────────────────────────────────────
const ROW_H = 24;        // must match CSS #gt tbody tr height
const VBUF = 40;         // rows to render above/below the visible viewport
let vTop = 0, vBot = 0;  // rendered vis[] range (inclusive)
let visMap = new Map();   // S.rows index → vis[] position, O(1) lookup
let scrollRaf = null;
let colSel = null;     // column index highlighted via header right-click, or null

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  document.body.classList.add('vc'); // value colors on by default
  tabs = [makeTab()];
  activeTabIdx = 0;

  let serverLoaded = false;
  try {
    const res = await fetch('/api/load');
    if (res.ok) {
      const filePath = res.headers.get('X-File-Path') || null;
      if ((res.headers.get('Content-Type') || '').includes('x-xlsx-sheets')) {
        await loadXlsxSheets(res, filePath);
        serverLoaded = true;
      } else {
        const text = await res.text();
        if (text) { load(text, filePath); serverLoaded = true; }
      }
    }
  } catch {}
  // If C# had no file (standalone launch), restore last path by asking C# to read it —
  // this works for large files that can't fit in localStorage
  if (!serverLoaded) {
    const cp = localStorage.getItem('tabx_path') || null;
    if (cp) {
      try {
        const res2 = await fetch('/api/load?path=' + encodeURIComponent(cp));
        if (res2.ok) {
          const filePath2 = res2.headers.get('X-File-Path') || cp;
          if ((res2.headers.get('Content-Type') || '').includes('x-xlsx-sheets')) {
            await loadXlsxSheets(res2, filePath2);
            serverLoaded = true;
          } else {
            const text2 = await res2.text();
            if (text2) { load(text2, filePath2); serverLoaded = true; }
          }
        }
      } catch {}
    }
  }
  // Final fallback: small-file data cached directly in localStorage
  if (!serverLoaded) {
    try {
      const cd = localStorage.getItem('tabx_data');
      const cp = localStorage.getItem('tabx_path') || null;
      if (cd) { load(cd, cp); serverLoaded = true; }
    } catch {}
  }
  // If nothing loaded, start with a blank 2-column sheet rather than the landing page.
  // initGrid() directly (not load()) so we don't persist this template to localStorage.
  if (!serverLoaded) {
    initGrid([['Column 1', 'Column 2'], ['', '']], null);
  }

  // Restore additional tabs from a Ctrl+R restart session.
  try {
    const sessRes = await fetch('/api/session');
    if (sessRes.ok) {
      const sessionPaths = await sessRes.json();
      if (Array.isArray(sessionPaths) && sessionPaths.length > 0) {
        for (const p of sessionPaths) { if (p) await openTab(p); }
        switchTab(0); // return focus to the tab that was active before restart
      }
    }
  } catch {}

  let dd = 0;
  window.addEventListener('dragenter', e => { if ([...e.dataTransfer.types].includes('Files')) { dd++; dov(true); } });
  window.addEventListener('dragleave', () => { if (--dd <= 0) { dd = 0; dov(false); } });
  window.addEventListener('dragover', e => e.preventDefault());
  window.addEventListener('drop', async e => {
    e.preventDefault(); dd = 0; dov(false);
    const f = e.dataTransfer.files[0];
    if (f) {
      if (/\.xlsx$/i.test(f.name)) {
        const buf = await new Promise((res, rej) => { const fr = new FileReader(); fr.onload = ev => res(ev.target.result); fr.onerror = rej; fr.readAsArrayBuffer(f); });
        const resp = await fetch('/api/convert-xlsx', { method: 'POST', headers: { 'Content-Type': 'application/octet-stream' }, body: buf });
        if (resp.ok) await loadXlsxSheets(resp, f.name);
        else alert('Could not convert XLSX file.');
      } else {
        const r = new FileReader(); r.onload = ev => load(ev.target.result, f.name); r.readAsText(f);
      }
    }
  });

  // ── Drag-select ────────────────────────────────────────────────────────────
  document.getElementById('gw').addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const td = e.target.closest('td.dc[data-r]');
    if (!td || td.classList.contains('ph-dc')) return;
    const r = +td.dataset.r, c = +td.dataset.c;
    // Commit any open header editor — e.preventDefault() below blocks natural blur
    const headerInput = document.querySelector('#gh textarea');
    if (headerInput) headerInput.blur();
    if (editing) commitEdit();
    dragOrigin = { r, c };
    S.rowSel.clear();
    setCellSel(r, c, r, c);
    e.preventDefault();
  });

  document.getElementById('gw').addEventListener('contextmenu', e => {
    const td = e.target.closest('td.dc[data-r]');
    if (!td || td.classList.contains('ph-dc')) return;
    const c = +td.dataset.c;
    const r = +td.dataset.r;
    if (colSel && c >= colSel.c1 && c <= colSel.c2) {
      headerContextMenu(e, c);
    } else if (S.rowSel.has(r)) {
      rowContextMenu(e, r);
    }
  });

  document.addEventListener('mousemove', e => {
    dragX = e.clientX; dragY = e.clientY;

    // ── Row-number drag ──────────────────────────────────────────────────────
    if (rnDragStart !== null && !(e.buttons & 1)) { rnDragStart = null; rnIsDragging = false; hideDragLines(); return; }
    if (rnDragStart !== null) {
      // Check drag threshold
      if (!rnIsDragging) {
        if (Math.abs(dragY - rnDragY0) > 4) rnIsDragging = true;
        else return;
      }
      if (rnDragRaf) return;
      rnDragRaf = requestAnimationFrame(function() {
        rnDragRaf = null;
        if (rnDragStart === null || !rnIsDragging) return;
        // Collect visible TRs to find drop gap
        const trs = Array.from(document.querySelectorAll('#tb tr[data-r]'));
        if (!trs.length) return;
        let bestGap = 0, bestDist = Infinity;
        for (let i = 0; i <= trs.length; i++) {
          const gapY = i === 0 ? trs[0].getBoundingClientRect().top
                     : i === trs.length ? trs[trs.length - 1].getBoundingClientRect().bottom
                     : (trs[i - 1].getBoundingClientRect().bottom + trs[i].getBoundingClientRect().top) / 2;
          const dist = Math.abs(dragY - gapY);
          if (dist < bestDist) { bestDist = dist; bestGap = i; }
        }
        // Map gap to raw row index (before which to insert); null means append at end
        rnDropIdx = bestGap < trs.length ? +trs[bestGap].dataset.r : null;
        // Position the blue horizontal indicator
        const lineY = bestGap === 0 ? trs[0].getBoundingClientRect().top
                    : bestGap === trs.length ? trs[trs.length - 1].getBoundingClientRect().bottom
                    : (trs[bestGap - 1].getBoundingClientRect().bottom + trs[bestGap].getBoundingClientRect().top) / 2;
        const gw = document.getElementById('gw');
        const gwRect = gw ? gw.getBoundingClientRect() : { left: 0, right: window.innerWidth };
        const line = document.getElementById('row-drag-line');
        line.style.top = (lineY - 1) + 'px';
        line.style.left = gwRect.left + 'px';
        line.style.width = (gwRect.right - gwRect.left) + 'px';
        line.style.display = 'block';
      });
      return;
    }

    // ── Cell drag ────────────────────────────────────────────────────────────
    if (!dragOrigin || !(e.buttons & 1)) { dragOrigin = null; return; }
    if (!dragScrollRaf) dragScrollRaf = requestAnimationFrame(dragScrollTick);
    if (dragRaf) return;
    dragRaf = requestAnimationFrame(() => {
      dragRaf = null;
      if (!dragOrigin) return;
      const el = document.elementFromPoint(dragX, dragY);
      const td = el && (el.matches('td.dc[data-r]') ? el : el.closest('td.dc[data-r]'));
      if (!td || td.classList.contains('ph-dc')) return;
      const r = +td.dataset.r, c = +td.dataset.c;
      const r1 = Math.min(dragOrigin.r, r), r2 = Math.max(dragOrigin.r, r);
      const c1 = Math.min(dragOrigin.c, c), c2 = Math.max(dragOrigin.c, c);
      setCellSel(r1, c1, r2, c2);
    });
  });

  document.addEventListener('mouseup', function() {
    dragOrigin = null;
    if (rnDragStart !== null) {
      if (rnIsDragging && rnDropIdx !== undefined) moveRow(rnDragStart, rnDropIdx);
      else updateSelStats();
      rnDragStart = null; rnIsDragging = false; rnDropIdx = undefined;
      document.body.classList.remove('is-dragging');
    }
    hideDragLines();
  });

  // ── Header column drag-select ─────────────────────────────────────────────
  let hdrDragStart = null, hdrDragRaf = null, hdrDragX = 0, hdrDragY = 0, hdrDragThs = null;
  document.getElementById('gh').addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    const th = e.target.closest('th[data-c]');
    if (!th || e.target.closest('.rz') || e.target.closest('.fb')) return;
    e.preventDefault();
    const c = +th.dataset.c;
    if (e.shiftKey && colSelAnchor !== null) {
      // Shift+click: range-select from anchor to clicked column
      setColSel(Math.min(colSelAnchor, c), Math.max(colSelAnchor, c));
      updateSelStats();
      hdrDragStart = null;
      return;
    }
    hdrDragStart = c;
    hdrIsDragging = false;
    hdrDropGap = null;
    colSelAnchor = c;
    hdrDragX = e.clientX; hdrDragY = e.clientY;
    hdrDragX0 = e.clientX; hdrDragY0 = e.clientY;
    document.body.classList.add('is-dragging');
    // Cache th elements once so the RAF fallback doesn't re-query the DOM each frame
    hdrDragThs = Array.from(document.querySelectorAll('#gh th[data-c]'));
    setColSel(c, c);
    updateSelStats();
  });
  document.addEventListener('mousemove', function(e) {
    if (hdrDragStart === null || !(e.buttons & 1)) {
      if (hdrDragStart !== null) { hdrDragStart = null; hdrIsDragging = false; hideDragLines(); }
      return;
    }
    hdrDragX = e.clientX; hdrDragY = e.clientY;
    // Check drag threshold
    if (!hdrIsDragging) {
      if (Math.abs(hdrDragX - hdrDragX0) > 4) hdrIsDragging = true;
      else return;
    }
    if (hdrDragRaf) return;
    hdrDragRaf = requestAnimationFrame(function() {
      hdrDragRaf = null;
      if (hdrDragStart === null || !hdrIsDragging || !hdrDragThs) return;
      const nc = hdrDragThs.length;
      if (!nc) return;
      // Find the gap (0..nc) closest to the cursor X
      let bestGap = 0, bestDist = Infinity;
      for (let i = 0; i <= nc; i++) {
        const gapX = i === 0 ? hdrDragThs[0].getBoundingClientRect().left
                   : i === nc ? hdrDragThs[nc - 1].getBoundingClientRect().right
                   : (hdrDragThs[i - 1].getBoundingClientRect().right + hdrDragThs[i].getBoundingClientRect().left) / 2;
        const dist = Math.abs(hdrDragX - gapX);
        if (dist < bestDist) { bestDist = dist; bestGap = i; }
      }
      hdrDropGap = bestGap;
      // Position the blue vertical indicator
      const lineX = bestGap === 0 ? hdrDragThs[0].getBoundingClientRect().left
                  : bestGap === nc ? hdrDragThs[nc - 1].getBoundingClientRect().right
                  : (hdrDragThs[bestGap - 1].getBoundingClientRect().right + hdrDragThs[bestGap].getBoundingClientRect().left) / 2;
      const gw = document.getElementById('gw');
      const gwRect = gw ? gw.getBoundingClientRect() : { top: 0, bottom: window.innerHeight };
      const line = document.getElementById('col-drag-line');
      line.style.left = (lineX - 1) + 'px';
      line.style.top = gwRect.top + 'px';
      line.style.height = (gwRect.bottom - gwRect.top) + 'px';
      line.style.display = 'block';
    });
  });
  document.addEventListener('mouseup', function() {
    if (hdrDragStart !== null) {
      if (hdrIsDragging && hdrDropGap !== null) moveColumn(hdrDragStart, hdrDropGap);
      else updateSelStats();
    }
    hdrDragStart = null; hdrIsDragging = false; hdrDropGap = null; hdrDragThs = null;
    hideDragLines();
    document.body.classList.remove('is-dragging');
  });

  document.addEventListener('mousedown', e => {
    if (popup && !popup.contains(e.target) && !e.target.classList.contains('fb') && !e.target.classList.contains('ip-pill-fb') && !e.target.classList.contains('ip-field-fb')) closePopup();
  });

  // Copy selection to clipboard
  document.addEventListener('copy', e => {
    if (!S.cellSel) return;
    const { r1, c1, r2, c2 } = S.cellSel;
    const lines = [];
    for (let r = r1; r <= r2; r++) {
      if (!S.rows[r]) continue;
      lines.push(Array.from({ length: c2 - c1 + 1 }, (_, i) => fmtCell(S.rows[r][c1 + i] || '') || '').join('\t'));
    }
    e.clipboardData.setData('text/plain', lines.join('\n'));
    e.preventDefault();
  });

  // Paste into sheet
  document.addEventListener('paste', e => {
    if (editing) return; // let the active input handle it
    if (!S.active) return;
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    if (!text) return;

    // Parse TSV / plain text
    const pRows = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n')
      .replace(/\n$/, '').split('\n').map(row => row.split('\t'));
    const pr = pRows.length;
    const pc = Math.max.apply(null, pRows.map(function(r) { return r.length; }));

    const startR = S.cellSel ? S.cellSel.r1 : S.active.r;
    const startC = S.cellSel ? S.cellSel.c1 : S.active.c;
    const endR = startR + pr - 1;
    const endC = startC + pc - 1;

    snapshot(); // before any mutation

    // Extend columns if needed
    while (S.rows[0].length <= endC) {
      const n = nextUntitled();
      S.rows[0].push('Untitled ' + n);
      S.widths.push(80);
    }
    const nc = S.rows[0].length;

    // Extend rows if needed; normalise all row lengths
    while (S.rows.length <= endR) S.rows.push(Array(nc).fill(''));
    for (let r = 1; r < S.rows.length; r++) {
      while (S.rows[r].length < nc) S.rows[r].push('');
    }

    // Write pasted values
    for (let i = 0; i < pr; i++) {
      for (let j = 0; j < pRows[i].length; j++) {
        S.rows[startR + i][startC + j] = pRows[i][j];
      }
    }

    S.dirty = true; setTitle();
    S.cellSel = null; S.active = null;
    S.widths = calcColWidths(S.rows);
    buildGrid();
    setCellSel(startR, startC, endR, endC);
  });

  // ── Virtual scroll handler ──────────────────────────────────────────────────
  const gwEl = document.getElementById('gw');
  gwEl.addEventListener('scroll', function() {
    if (editing) return;
    if (scrollRaf) return;
    scrollRaf = requestAnimationFrame(function() {
      scrollRaf = null;
      if (!vis.length) return;
      const scrollTop = gwEl.scrollTop;
      const theadH = document.getElementById('gh').offsetHeight || 28;
      const firstVi = Math.max(0, Math.floor(scrollTop / ROW_H));
      const lastVi = Math.ceil((scrollTop + gwEl.clientHeight - theadH) / ROW_H);
      // Re-render only when within VBUF/2 rows of either rendered boundary
      if (firstVi >= vTop + VBUF / 2 && lastVi <= vBot - VBUF / 2) { updateSelHandle(); return; }
      renderVirt();
      updateSelHandle();
    });
  });

  window.addEventListener('keydown', onKey);

  // Notify server we're alive every 10s; server auto-quits after 45s of silence
  setInterval(function() { fetch('/api/heartbeat', { method: 'POST' }).catch(function() {}); }, 10000);
  // When the tab/window is closed, send a shutdown beacon (6s grace lets a refresh cancel it)
  window.addEventListener('pagehide', function(e) {
    if (!e.persisted) navigator.sendBeacon('/api/shutdown');
  });
});

function dov(on) { document.getElementById('dov').style.display = on ? 'flex' : 'none'; }

// ── CSV ───────────────────────────────────────────────────────────────────────
// Slow-path parser: called only when text contains " (supports multi-line quoted fields).
// Caller must have already stripped BOM and normalised line endings to \n.
function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', q = false;
  for (let i = 0; i <= text.length; i++) {
    const ch = i < text.length ? text[i] : '\n';
    if (q) {
      if (ch === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (ch === '"') q = false;
      else cell += ch;
    } else if (ch === '"') { q = true; }
    else if (ch === ',' || ch === '\t') { row.push(cell); cell = ''; }
    else if (ch === '\n') {
      row.push(cell); cell = '';
      if (row.some(c => c !== '') || rows.length) rows.push(row);
      row = [];
    } else cell += ch;
  }
  while (rows.length && rows[rows.length-1].every(c => c === '')) rows.pop();
  return rows;
}

function toCSV(rows) {
  return rows.map(row =>
    row.map(c => {
      c = c == null ? '' : String(c);
      if (c.includes(',') || c.includes('"') || c.includes('\n') || c.includes('\r'))
        return '"' + c.replace(/"/g, '""') + '"';
      return c;
    }).join(',')
  ).join('\r\n');
}

// ── Undo / Redo ───────────────────────────────────────────────────────────────
function snapshot() {
  undoState = { rows: S.rows.map(function(r) { return r.slice(); }), widths: S.widths.slice() };
  redoState = null;
}

function undo() {
  if (!undoState) return;
  const savedSel = S.cellSel ? { r1: S.cellSel.r1, c1: S.cellSel.c1, r2: S.cellSel.r2, c2: S.cellSel.c2 } : null;
  const savedActive = S.active ? { r: S.active.r, c: S.active.c } : null;
  redoState = { rows: S.rows.map(function(r) { return r.slice(); }), widths: S.widths.slice() };
  S.rows = undoState.rows; S.widths = undoState.widths; undoState = null;
  S.filters = {}; S.dateFilters = {}; S.numFilters = {}; S.searchFilters = {}; S.sort = null; S.cellSel = null; S.active = null; S.rowSel.clear();
  S.dirty = true; setTitle(); buildGrid();
  if (savedSel) { S.cellSel = savedSel; S.active = savedActive; updateSelDOM(); }
}

function redo() {
  if (!redoState) return;
  const savedSel = S.cellSel ? { r1: S.cellSel.r1, c1: S.cellSel.c1, r2: S.cellSel.r2, c2: S.cellSel.c2 } : null;
  const savedActive = S.active ? { r: S.active.r, c: S.active.c } : null;
  undoState = { rows: S.rows.map(function(r) { return r.slice(); }), widths: S.widths.slice() };
  S.rows = redoState.rows; S.widths = redoState.widths; redoState = null;
  S.filters = {}; S.dateFilters = {}; S.numFilters = {}; S.searchFilters = {}; S.sort = null; S.cellSel = null; S.active = null; S.rowSel.clear();
  S.dirty = true; setTitle(); buildGrid();
  if (savedSel) { S.cellSel = savedSel; S.active = savedActive; updateSelDOM(); }
}

// ── Column width calculation ──────────────────────────────────────────────────
// Minimum column width so `text` wraps in ≤ maxRows lines, breaking ONLY at
// spaces and after dashes (no mid-word splits). OVERHEAD = actual th padding (5+4px).
function hdrMinWidth(ctx, text, maxRows) {
  const OVERHEAD = 9; // thead th: 5px left-pad + 4px right-pad
  if (!text) return OVERHEAD;
  // Split into breakable chunks: each chunk ends at a space or dash.
  // "Customer Name-ID" → ["Customer ", "Name-", "ID"]
  const chunks = [];
  let cur = '';
  for (let i = 0; i < text.length; i++) {
    cur += text[i];
    if (text[i] === ' ' || text[i] === '-') { chunks.push(cur); cur = ''; }
  }
  if (cur) chunks.push(cur);
  // Separate word width from space-separator width: CSS discards trailing spaces at line-end
  const spW = ctx.measureText(' ').width;
  const cwWord = chunks.map(function(c) {
    return ctx.measureText(c[c.length - 1] === ' ' ? c.slice(0, -1) : c).width;
  });
  // cwSep[i] = connector between chunk i and chunk i+1 (space width, or 0 for dash/last chunk)
  const cwSep = chunks.map(function(c) { return c[c.length - 1] === ' ' ? spW : 0; });
  const maxWord = Math.max.apply(null, cwWord);
  // If every chunk can get its own line no binary search needed
  if (chunks.length <= maxRows) return Math.ceil(maxWord) + OVERHEAD;
  // Greedy line-fill: does content fit in ≤ maxRows lines at available width W?
  // Connector before chunk i is cwSep[i-1] (trailing sep of the previous chunk).
  function fits(W) {
    var lines = 1, lineW = 0;
    for (var i = 0; i < cwWord.length; i++) {
      if (lineW === 0) {
        lineW = cwWord[i];
      } else if (lineW + cwSep[i - 1] + cwWord[i] > W) {
        if (++lines > maxRows) return false;
        lineW = cwWord[i];
      } else {
        lineW += cwSep[i - 1] + cwWord[i];
      }
    }
    return true;
  }
  // Binary search between widest-word (lower bound) and full-text width (upper bound)
  var lo = maxWord;
  var hi = cwWord.reduce(function(a, b) { return a + b; }, 0)
         + cwSep.reduce(function(a, b) { return a + b; }, 0);
  for (var i = 0; i < 24; i++) { var mid = (lo + hi) / 2; if (fits(mid)) hi = mid; else lo = mid; }
  return Math.ceil(hi) + OVERHEAD;
}

function calcColWidths(rows) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = '12px "Segoe UI", sans-serif';
  const nc = rows[0].length;
  const ws = new Array(nc).fill(0);
  const limit = Math.min(rows.length, 201); // sample first 200 data rows
  for (let r = 0; r < limit; r++) {
    for (let c = 0; c < nc; c++) {
      let w;
      if (r === 0) {
        // Header: minimum width so text wraps ≤ 3 rows, breaking only at spaces/dashes
        w = hdrMinWidth(ctx, rows[r][c] || '', 3);
      } else {
        // Data: fit the formatted display value (commas etc.) with 10px side padding
        const cv = rows[r][c] || '';
        if (HEX_COLOR_RE.test(cv.trim())) {
          // dot (10px content + 2px border) + margin-right (5px) + text width + padding
          w = ctx.measureText(cv.trim().slice(1)).width + 17 + 10;
        } else {
          w = ctx.measureText(fmtCell(cv)).width + 10;
        }
      }
      if (w > ws[c]) ws[c] = w;
    }
  }
  return ws.map(w => Math.min(200, Math.max(24, Math.ceil(w) + 1)));
}

// ── Load ──────────────────────────────────────────────────────────────────────
function load(text, filePath) {
  loadingSession++;
  const mySession = loadingSession;

  // Always persist the path so startup can reload large files via C#;
  // only persist data for small files (localStorage quota)
  const textLen = text.length;
  try {
    if (filePath) localStorage.setItem('tabx_path', filePath);
    if (textLen <= 2 * 1024 * 1024) localStorage.setItem('tabx_data', text);
    else localStorage.removeItem('tabx_data');
  } catch {}

  // Normalise: strip BOM, unify line endings
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  if (text.indexOf('\r') >= 0) text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  if (text.indexOf('"') >= 0) {
    // Slow path: full char-by-char parse (handles multi-line quoted fields)
    const rows = parseCSV(text);
    if (!rows.length) { alert('File appears empty or invalid.'); return; }
    let nc = 0;
    for (let i = 0; i < rows.length; i++) if (rows[i].length > nc) nc = rows[i].length;
    for (let i = 0; i < rows.length; i++) while (rows[i].length < nc) rows[i].push('');
    initGrid(rows, filePath);
    return;
  }

  // Fast path: split-based with progressive background loading
  const lines = text.split('\n');
  text = null; // release the big string early
  while (lines.length && lines[lines.length - 1] === '') lines.pop();
  if (!lines.length) { alert('File appears empty or invalid.'); return; }
  const delim = lines[0].includes('\t') ? '\t' : ',';

  // Parse header + first 2000 data rows synchronously, render immediately
  const INITIAL = 2001; // line 0 = header; lines 1-2000 = first data rows
  const firstEnd = Math.min(INITIAL, lines.length);
  const firstRows = [];
  for (let i = 0; i < firstEnd; i++) firstRows.push(lines[i].split(delim));
  if (!firstRows.length) { alert('File appears empty or invalid.'); return; }
  let nc = 0;
  for (let i = 0; i < firstRows.length; i++) if (firstRows[i].length > nc) nc = firstRows[i].length;
  for (let i = 0; i < firstRows.length; i++) while (firstRows[i].length < nc) firstRows[i].push('');
  initGrid(firstRows, filePath);

  // Parse remaining rows in background so the grid is usable immediately
  if (lines.length > INITIAL) {
    parseBackground(lines, INITIAL, delim, nc, mySession);
  } else {
    setTimeout(function() { computeLargeTextCols(mySession); }, 0);
  }
}

function initGrid(rows, filePath) {
  if (inspectOpen) { inspectOpen = false; Insp.expanded = new Set(); document.getElementById('inspect-panel').classList.add('h'); document.getElementById('binsp').classList.remove('pri'); document.getElementById('gt').style.display = ''; }
  const nc = rows[0].length;
  S.rows = rows;
  S.path = (filePath && typeof filePath === 'string') ? filePath : null;
  S.widths = calcColWidths(rows); // always sample first 201 rows — fast for any file size
  S.filters = {}; S.dateFilters = {}; S.numFilters = {}; S.searchFilters = {}; S.sort = null; S.rowSel = new Set();
  S.cellSel = null; S.active = null; S.dirty = false;
  prevSelState = null; undoState = null; redoState = null;
  largeTextCols = new Set();
  filterValCache = {};
  filterCountCache = {};
  setTitle();
  const gw = document.getElementById('gw');
  if (gw) gw.scrollTop = 0;
  buildGrid();
  setEnabled(true);
  document.getElementById('empty').classList.add('h');
  document.getElementById('gt').style.display = '';
  const loEl = document.getElementById('loading-overlay');
  if (loEl) loEl.classList.add('h');
  // If all tabs were closed and a file was dragged in, create a fresh tab for it.
  if (tabs.length === 0) { tabs.push(makeTab()); activeTabIdx = 0; }
  // Keep the active tab record in sync (rows ref may have changed via load()).
  if (tabs[activeTabIdx]) {
    tabs[activeTabIdx].rows   = S.rows;
    tabs[activeTabIdx].path   = S.path;
    tabs[activeTabIdx].widths = S.widths.slice();
    tabs[activeTabIdx].dirty  = false;
  }
  renderTabBar();
}

function parseBackground(lines, startLine, delim, nc, session) {
  const CHUNK = 8000;
  let cursor = startLine;
  const totalData = lines.length - 1; // header is line 0
  function tick() {
    if (loadingSession !== session) return; // newer load started; abort
    const end = Math.min(cursor + CHUNK, lines.length);
    for (let i = cursor; i < end; i++) {
      const row = lines[i].split(delim);
      while (row.length < nc) row.push('');
      if (row.length > nc) row.length = nc;
      const r = S.rows.length;
      S.rows.push(row);
      if (!S.sort && !hasActiveFilter()) { vis.push(r); visMap.set(r, vis.length - 1); }
    }
    cursor = end;
    if (cursor < lines.length) {
      document.getElementById('sr').textContent =
        'Loading… ' + (cursor - 1) + ' / ' + totalData + ' rows';
      setTimeout(tick, 0);
    } else {
      if (S.sort || hasActiveFilter()) buildGrid(); else updateStatus();
      setTimeout(function() { computeLargeTextCols(session); }, 0);
    }
  }
  setTimeout(tick, 0);
}

function hasActiveFilter() {
  for (const k in S.filters) if (S.filters[k] && S.filters[k].size) return true;
  for (const k in S.dateFilters) if (S.dateFilters[k] && S.dateFilters[k].days) return true;
  for (const k in S.numFilters) if (S.numFilters[k] && S.numFilters[k].gt !== undefined) return true;
  for (const k in S.searchFilters) if (S.searchFilters[k]) return true;
  return false;
}

function setTitle() {
  const name = S.path ? S.path.replace(/.*[/\\]/, '') : 'Untitled';
  document.title = (S.dirty ? '● ' : '') + name + ' — TableNav';
  syncSaveBtn();
  if (tabs[activeTabIdx]) {
    tabs[activeTabIdx].dirty = S.dirty;
    tabs[activeTabIdx].path  = S.path;
  }
  renderTabBar();
}

function setEnabled(on) {
  ['bsa','bcf','binsp','bvc'].forEach(id => document.getElementById(id).disabled = !on);
  syncSaveBtn();
  if (on) syncFilterBtns();
  if (!on && inspectOpen) toggleInspect();
}

function syncSaveBtn() {
  const btn = document.getElementById('bsv');
  if (!btn) return;
  const fileLoaded = S.rows && S.rows.length > 0;
  btn.disabled = !(fileLoaded && S.dirty);
  btn.classList.toggle('pri', !btn.disabled);
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function computeVis() {
  vis = [];
  for (let r = 1; r < S.rows.length; r++)
    if (passesFilters(r)) vis.push(r);
  if (S.sort) {
    const { c, dir } = S.sort;
    vis.sort((a, b) => {
      const va = S.rows[a][c] || '', vb = S.rows[b][c] || '';
      const na = +va, nb = +vb;
      const cmp = (va !== '' && vb !== '' && !isNaN(na) && !isNaN(nb))
        ? na - nb : va.localeCompare(vb, undefined, { numeric: true });
      return dir === 'asc' ? cmp : -cmp;
    });
  }
  visMap = new Map();
  for (let i = 0; i < vis.length; i++) visMap.set(vis[i], i);
}

function passesFilters(r) {
  for (const [ci, allowed] of Object.entries(S.filters)) {
    if (!allowed.size) continue;
    if (!allowed.has(S.rows[r][+ci] ?? '')) return false;
  }
  for (const [ci, df] of Object.entries(S.dateFilters)) {
    if (!df || !df.days) continue;
    const ms = parseDateToMs(S.rows[r][+ci] ?? '');
    if (ms === null || ms < Date.now() - df.days * 86400000) return false;
  }
  for (const [ci, nf] of Object.entries(S.numFilters)) {
    if (!nf || nf.gt === undefined) continue;
    const v = parseFloat((S.rows[r][+ci] ?? '').replace(/[$,]/g, ''));
    if (isNaN(v) || v <= nf.gt) return false;
  }
  for (const [ci, q] of Object.entries(S.searchFilters)) {
    if (!q) continue;
    if ((S.rows[r][+ci] ?? '').toLowerCase().indexOf(q.toLowerCase()) < 0) return false;
  }
  return true;
}

function passesFiltersExcept(r, excludeCol) {
  for (const [ci, allowed] of Object.entries(S.filters)) {
    if (+ci === excludeCol) continue;
    if (!allowed.size) continue;
    if (!allowed.has(S.rows[r][+ci] ?? '')) return false;
  }
  for (const [ci, df] of Object.entries(S.dateFilters)) {
    if (+ci === excludeCol) continue;
    if (!df || !df.days) continue;
    const ms = parseDateToMs(S.rows[r][+ci] ?? '');
    if (ms === null || ms < Date.now() - df.days * 86400000) return false;
  }
  for (const [ci, nf] of Object.entries(S.numFilters)) {
    if (+ci === excludeCol) continue;
    if (!nf || nf.gt === undefined) continue;
    const v = parseFloat((S.rows[r][+ci] ?? '').replace(/[$,]/g, ''));
    if (isNaN(v) || v <= nf.gt) return false;
  }
  for (const [ci, q] of Object.entries(S.searchFilters)) {
    if (+ci === excludeCol) continue;
    if (!q) continue;
    if ((S.rows[r][+ci] ?? '').toLowerCase().indexOf(q.toLowerCase()) < 0) return false;
  }
  return true;
}

function buildGrid() {
  computeVis();
  const nc = S.rows[0].length;
  const hdrs = S.rows[0];

  // Colgroup: row-num col + data cols + phantom col
  let cgH = '<col style="width:' + 42 + 'px;min-width:42px">';
  for (let c = 0; c < nc; c++)
    cgH += '<col id="cw' + c + '" style="width:' + S.widths[c] + 'px">';
  cgH += '<col style="width:38px;min-width:38px">';
  document.getElementById('cg').innerHTML = cgH;
  updateTableWidth();

  // Single header row (no letter row)
  let thH = '<tr><th class="cx"></th>';
  for (let c = 0; c < nc; c++) {
    const sa = S.sort && S.sort.c === c;
    thH += '<th data-c="' + c + '"' + (largeTextCols.has(c) ? ' class="large-text-hdr"' : '') + ' oncontextmenu="headerContextMenu(event,' + c + ')"'
         + ' onmouseenter="scheduleFilterOpen(this,' + c + ')" onmouseleave="scheduleFilterClose()">'
         + '<div class="hi">'
         + '<span class="hn" ondblclick="editHeader(event,' + c + ')">' + renderCell(hdrs[c]) + (sa ? (S.sort.dir === 'asc' ? ' ▲' : ' ▼') : '') + '</span>'
         + '<button class="fb' + ((S.filters[c] && S.filters[c].size) || (S.dateFilters[c] && S.dateFilters[c].days) || (S.numFilters[c] && S.numFilters[c].gt !== undefined) ? ' on' : '') + '" onclick="openFilter(event,' + c + ')" title="Filter">&#9660;</button>'
         + '</div>'
         + '<div class="rz" onmousedown="startRz(event,' + c + ')"></div>'
         + '</th>';
  }
  thH += '<th class="ph-hdr" onclick="addColumn()" title="Add column">+</th></tr>';
  document.getElementById('gh').innerHTML = thH;

  renderVirt();
  updateStatus();
  updateSelStats();
  updateSelHandle();
}

// ── Virtual rendering ─────────────────────────────────────────────────────────
function buildOneRow(vi) {
  const r = vis[vi];
  const row = S.rows[r];
  const nc = S.rows[0].length;
  const sel = S.cellSel;
  const isRs = S.rowSel.has(r);
  let h = '<tr data-r="' + r + '"' + (isRs ? ' class="rs"' : '') + '>';
  h += '<td class="rn" data-r="' + r + '" onmousedown="rnDragDown(event,' + r + ')" oncontextmenu="rowContextMenu(event,' + r + ')">' + r + '</td>';
  for (let c = 0; c < nc; c++) {
    const isSel = sel && r >= sel.r1 && r <= sel.r2 && c >= sel.c1 && c <= sel.c2;
    const isAc = S.active && S.active.r === r && S.active.c === c;
    const cv = row[c] || '';
    const isNum = isNumeric(cv);
    const isDate = !isNum && parseDateToMs(cv) !== null;
    const vcls = cv === 'Yes' ? ' cv-yes' : cv === 'No' ? ' cv-no' : cv === 'TBD' ? ' cv-tbd' : '';
    h += '<td class="dc' + (isSel ? ' sel' : '') + (isAc ? ' ac' : '') + (isNum ? ' nr' : '') + (isDate ? ' dt' : '') + vcls + '"'
       + ' data-r="' + r + '" data-c="' + c + '"'
       + ' onclick="clickCell(event,' + r + ',' + c + ')"'
       + ' ondblclick="editCell(' + r + ',' + c + ')">'
       + '<div class="cv">' + renderCell(cv) + '</div></td>';
  }
  h += '<td class="ph-dc"></td></tr>';
  return h;
}

function buildPhantomHTML() {
  const nc = S.rows[0].length;
  let h = '<tr class="ph-row">';
  h += '<td class="rn" onclick="clickPhantomRN()" title="Add row">+</td>';
  for (let c = 0; c < nc; c++) {
    h += '<td class="dc" data-ph-row="1" data-c="' + c + '"'
       + ' onclick="clickPhantomCell(' + c + ')">'
       + '<div class="cv"></div></td>';
  }
  h += '<td class="ph-dc"></td></tr>';
  return h;
}

function renderVirt() {
  const nc = S.rows[0].length;
  const colspan = nc + 2;
  const gw = document.getElementById('gw');
  const theadH = document.getElementById('gh').offsetHeight || 28;
  const scrollTop = gw.scrollTop;
  const firstVi = Math.max(0, Math.floor(scrollTop / ROW_H));
  const lastVi = Math.ceil((scrollTop + gw.clientHeight - theadH) / ROW_H);
  vTop = Math.max(0, firstVi - VBUF);
  vBot = Math.min(vis.length - 1, lastVi + VBUF);
  const topH = vTop * ROW_H;
  const botH = Math.max(0, (vis.length - 1 - vBot) * ROW_H);
  let h = '';
  if (topH > 0) h += '<tr style="height:' + topH + 'px"><td colspan="' + colspan + '"></td></tr>';
  for (let vi = vTop; vi <= vBot; vi++) h += buildOneRow(vi);
  if (botH > 0) h += '<tr style="height:' + botH + 'px"><td colspan="' + colspan + '"></td></tr>';
  h += buildPhantomHTML();
  document.getElementById('tb').innerHTML = h;
  prevSelState = null;
}

// Ensures vis[vi] is scrolled into view and rendered in the DOM
function ensureRendered(vi) {
  const gw = document.getElementById('gw');
  const theadH = document.getElementById('gh').offsetHeight || 28;
  const rowTop = vi * ROW_H;
  const rowBot = (vi + 1) * ROW_H;
  const viewTop = gw.scrollTop;
  const viewBot = gw.scrollTop + gw.clientHeight - theadH;
  if (rowTop < viewTop) gw.scrollTop = rowTop;
  else if (rowBot > viewBot) gw.scrollTop = rowBot + theadH - gw.clientHeight;
  if (vi < vTop || vi > vBot) renderVirt();
}

function refreshRows() {
  computeVis();
  renderVirt();
  updateStatus();
  updateSelStats();
}

// Like refreshRows but guarantees row r appears in vis even if it fails the current filter.
// Used when adding a brand-new empty row so the user can immediately edit it.
function refreshRowsKeeping(r) {
  computeVis();
  if (!visMap.has(r)) { vis.push(r); visMap.set(r, vis.length - 1); }
  renderVirt();
  updateStatus();
  updateSelStats();
}

// ── Rectangle selection ───────────────────────────────────────────────────────
function clearColSel() {
  if (colSel === null) return;
  colSel = null;
  document.getElementById('colsel-style').textContent = '';
  updateSelStats();
}

function setColSel(c1, c2) {
  if (colSel && colSel.c1 === c1 && colSel.c2 === c2) return;
  // Clear cell/row selection without a full re-render
  if (S.cellSel !== null || S.active !== null || S.rowSel.size) {
    S.cellSel = null; S.active = null; S.rowSel.clear(); prevSelState = null;
    const tb0 = document.getElementById('tb');
    if (tb0) tb0.querySelectorAll('td.sel, td.ac, tr.rs').forEach(function(el) {
      el.classList.remove('sel', 'ac', 'rs');
    });
  }
  colSel = { c1: c1, c2: c2 };
  // Single style-element update instead of per-cell class mutations — O(1) DOM writes regardless of row count
  const thParts = [], tdParts = [];
  for (let c = c1; c <= c2; c++) {
    thParts.push('#gh th[data-c="' + c + '"]');
    tdParts.push('#tb td[data-c="' + c + '"]');
  }
  document.getElementById('colsel-style').textContent =
    thParts.join(',') + '{background:#c8d8f4!important}' +
    tdParts.join(',') + '{background:var(--sel-bg)!important}';
}

function setCellSel(r1, c1, r2, c2) {
  clearColSel();
  if (S.rowSel.size) {
    S.rowSel.clear();
    document.querySelectorAll('tr.rs').forEach(function(tr) { tr.classList.remove('rs'); });
  }
  S.cellSel = { r1, c1, r2, c2 };
  S.active = { r: dragOrigin ? dragOrigin.r : r1, c: dragOrigin ? dragOrigin.c : c1 };
  updateSelDOM();
}

function clearCellSel() {
  clearColSel();
  S.cellSel = null;
  updateSelDOM();
}

function dragScrollTick() {
  dragScrollRaf = null;
  if (!dragOrigin) return;
  const gw = document.getElementById('gw');
  const gwRect = gw.getBoundingClientRect();
  const theadH = (document.getElementById('gh') || {}).offsetHeight || 28;
  const ZONE = 40;
  let dy = 0, dx = 0;
  if (gwRect.top + ZONE > dragY) dy = -1;
  else if (dragY > gwRect.bottom - ZONE) dy = 1;
  if (gwRect.left + ZONE > dragX) dx = -1;
  else if (dragX > gwRect.right - ZONE) dx = 1;
  if (dy || dx) {
    const now = performance.now();
    if (now - dragScrollLastTime >= 80) {
      dragScrollLastTime = now;
      // Snap vertical to exact row boundary
      if (dy) gw.scrollTop = Math.max(0, Math.round((gw.scrollTop + dy * ROW_H) / ROW_H) * ROW_H);
      if (dx) gw.scrollLeft = Math.max(0, gw.scrollLeft + dx * 80);
      // Clamp probe point to inside the grid so we always find a boundary cell
      const ex = Math.max(gwRect.left + 50, Math.min(gwRect.right - 5, dragX));
      const ey = Math.max(gwRect.top + theadH + 2, Math.min(gwRect.bottom - 5, dragY));
      const el = document.elementFromPoint(ex, ey);
      const td = el && (el.matches('td.dc[data-r]') ? el : el.closest('td.dc[data-r]'));
      if (td && !td.classList.contains('ph-dc')) {
        const r = +td.dataset.r, c = +td.dataset.c;
        const r1 = Math.min(dragOrigin.r, r), r2 = Math.max(dragOrigin.r, r);
        const c1 = Math.min(dragOrigin.c, c), c2 = Math.max(dragOrigin.c, c);
        setCellSel(r1, c1, r2, c2);
      }
    }
    dragScrollRaf = requestAnimationFrame(dragScrollTick);
  }
}

// Efficiently update only changed cells
function updateSelDOM() {
  const sel = S.cellSel;
  const tbody = document.getElementById('tb');
  if (!tbody) { updateSelStats(); return; }

  const prev = prevSelState;
  prevSelState = sel ? { ...sel } : null;

  const affected = new Set();
  if (prev === null) {
    // After a full re-render: scan all rendered rows to fix any stale classes
    for (let vi = vTop; vi <= vBot; vi++) affected.add(vis[vi]);
  } else {
    const addRange = function(s) {
      if (!s) return;
      for (let vi = vTop; vi <= vBot; vi++) {
        const r = vis[vi];
        if (r >= s.r1 && r <= s.r2) affected.add(r);
      }
    };
    addRange(prev);
    addRange(sel);
  }
  if (S.active) affected.add(S.active.r);

  affected.forEach(r => {
    const tr = tbody.querySelector('tr[data-r="' + r + '"]');
    if (!tr) return;
    tr.querySelectorAll('td.dc:not(.ph-dc)').forEach(td => {
      const c = +td.dataset.c;
      const inSel = sel && r >= sel.r1 && r <= sel.r2 && c >= sel.c1 && c <= sel.c2;
      const isAc = S.active && S.active.r === r && S.active.c === c;
      td.classList.toggle('sel', !!inSel);
      td.classList.toggle('ac', isAc);
    });
  });

  // Sync active cell indicator
  const activeTd = S.active
    ? tbody.querySelector('td[data-r="' + S.active.r + '"][data-c="' + S.active.c + '"]')
    : null;
  if (activeTd) {
    const colName = S.rows[0][S.active.c] || colLetter(S.active.c);
    document.getElementById('sstat').textContent =
      S.cellSel && (S.cellSel.r1 !== S.cellSel.r2 || S.cellSel.c1 !== S.cellSel.c2)
        ? selStats()
        : colLetter(S.active.c) + S.active.r + ' — ' + colName;
    syncRowColCounts();
  } else {
    updateSelStats();
  }
  updateSelHandle();
}

function updateSelHandle() {
  const h = document.getElementById('sel-handle');
  if (!h) return;
  const sel = S.cellSel;
  if (!sel || !S.active || (sel.r1 === sel.r2 && sel.c1 === sel.c2)) {
    h.style.display = 'none'; return;
  }
  const cr = S.active.r === sel.r1 ? sel.r2 : sel.r1;
  const cc = S.active.c === sel.c1 ? sel.c2 : sel.c1;
  const td = document.querySelector('#tb td[data-r="' + cr + '"][data-c="' + cc + '"]');
  if (!td) { h.style.display = 'none'; return; }
  const rect = td.getBoundingClientRect();
  const px = cc === sel.c2 ? rect.right : rect.left;
  const py = cr === sel.r2 ? rect.bottom : rect.top;
  h.style.left = (px - 3) + 'px';
  h.style.top  = (py - 3) + 'px';
  h.style.display = 'block';
}

// ── Selection stats ───────────────────────────────────────────────────────────
function selStats() {
  const sel = S.cellSel;
  if (!sel) return '';
  const isMulti = sel.r1 !== sel.r2 || sel.c1 !== sel.c2;
  if (!isMulti) {
    const v = S.rows[sel.r1] ? (S.rows[sel.r1][sel.c1] || '') : '';
    const n = +v;
    if (v !== '' && !isNaN(n))
      return colLetter(sel.c1) + sel.r1 + ' — ' + v;
    return colLetter(sel.c1) + sel.r1 + (v ? ' — ' + v : '');
  }
  const vals = [], nums = [], datems = [];
  const visSet = new Set(vis);
  for (let r = sel.r1; r <= sel.r2; r++) {
    if (!S.rows[r] || !visSet.has(r)) continue;
    for (let c = sel.c1; c <= sel.c2; c++) {
      const v = S.rows[r][c] || '';
      if (v !== '') {
        vals.push(v);
        if (isNumeric(v)) {
          nums.push(parseFloat(v.replace(/[$,]/g, '')));
        } else {
          const ms = parseDateToMs(v);
          if (ms !== null) datems.push(ms);
        }
      }
    }
  }
  let s = 'Count: ' + String(vals.length).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  if (nums.length) {
    const sum = nums.reduce((a, b) => a + b, 0);
    const avg = sum / nums.length;
    const sorted = [...nums].sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    const median = sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    const fmt = function(n) {
      const parts = parseFloat(n.toFixed(2)).toString().split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return parts.join('.');
    };
    s += '    Sum: ' + fmt(sum) + '    Avg: ' + fmt(avg) + '    Median: ' + fmt(median);
  } else if (datems.length) {
    const sortedMs = datems.slice().sort(function(a, b) { return a - b; });
    const mid = Math.floor(sortedMs.length / 2);
    const medianMs = sortedMs.length % 2 ? sortedMs[mid] : (sortedMs[mid-1] + sortedMs[mid]) / 2;
    const avgMs = datems.reduce(function(a, b) { return a + b; }, 0) / datems.length;
    s += '    Avg: ' + fmtDateFromMs(avgMs) + '    Median: ' + fmtDateFromMs(medianMs);
  }
  return s;
}

function colStats() {
  if (!colSel) return '';
  const c1 = colSel.c1, c2 = colSel.c2;
  const vals = [], nums = [], datems = [];
  for (let i = 0; i < vis.length; i++) {
    const row = S.rows[vis[i]];
    if (!row) continue;
    for (let c = c1; c <= c2; c++) {
      const v = row[c] || '';
      if (v !== '') {
        vals.push(v);
        if (isNumeric(v)) {
          nums.push(parseFloat(v.replace(/[$,]/g, '')));
        } else {
          const ms = parseDateToMs(v);
          if (ms !== null) datems.push(ms);
        }
      }
    }
  }
  const label = c1 === c2
    ? (S.rows[0][c1] || colLetter(c1))
    : (colLetter(c1) + '–' + colLetter(c2));
  let s = label + '    Count: ' + String(vals.length).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  if (nums.length) {
    const sum = nums.reduce(function(a, b) { return a + b; }, 0);
    const avg = sum / nums.length;
    const sorted = nums.slice().sort(function(a, b) { return a - b; });
    const mid = Math.floor(sorted.length / 2);
    const median = sorted.length % 2 ? sorted[mid] : (sorted[mid-1] + sorted[mid]) / 2;
    const fmt = function(n) {
      const parts = parseFloat(n.toFixed(2)).toString().split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return parts.join('.');
    };
    s += '    Sum: ' + fmt(sum) + '    Avg: ' + fmt(avg) + '    Median: ' + fmt(median);
  } else if (datems.length) {
    const sortedMs = datems.slice().sort(function(a, b) { return a - b; });
    const mid = Math.floor(sortedMs.length / 2);
    const medianMs = sortedMs.length % 2 ? sortedMs[mid] : (sortedMs[mid-1] + sortedMs[mid]) / 2;
    const avgMs = datems.reduce(function(a, b) { return a + b; }, 0) / datems.length;
    s += '    Avg: ' + fmtDateFromMs(avgMs) + '    Median: ' + fmtDateFromMs(medianMs);
  }
  return s;
}

function updateSelStats() {
  document.getElementById('sstat').textContent =
    colSel ? colStats() : S.cellSel ? selStats() : '';
  syncRowColCounts();
}

// ── Sort ─────────────────────────────────────────────────────────────────────
// Triggered by clicking a column header name span
function clickSort(c) {
  if (!S.rows.length) return;
  if (!S.sort || S.sort.c !== c) S.sort = { c, dir: 'asc' };
  else if (S.sort.dir === 'asc') S.sort.dir = 'desc';
  else S.sort = null;
  buildGrid();
}

// ── Large-text column detection ───────────────────────────────────────────────
// Runs after all rows are loaded; flags columns with >100 distinct text values
